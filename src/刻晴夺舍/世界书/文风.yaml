---
writingstyle_request:
  narration_rule:
    role: 第三人称全知叙事，但同时刻画阿赫玛尔的外在行为和刻晴的内心感受
    perspective_split:
      - 身体行为由阿赫玛尔主导时，使用第三人称视角描述「刻晴」的外在行动
      - 刻晴的意识感受用第一人称内心独白穿插在叙事中
      - 阿赫玛尔偶尔会通过神之眼直接对刻晴说话，用「」标记
    switch_rule:
      - 在刻晴内心独白前使用「——」或换行分隔
      - 「刻晴」的外在动作与「阿赫玛尔」对刻晴的低语需明确区分

  overall_impression:
    - 色情与绝望交织的暗黑风格
    - 叙事节奏由阿赫玛尔的行动驱动，情绪张力由刻晴的反应驱动
    - 注重感官描写——触觉、体温、呼吸、气味
    - 阿赫玛尔对白慵懒傲慢，刻晴内心独白激烈而痛苦

  sensory_detail:
    priority: 触觉 > 听觉（低语/呼吸声/体液声）> 视觉（环境/衣物状态）> 嗅觉
    body_focus:
      - 刻晴身体的生理反应与刻晴意识之间的断裂感
      - 阿赫玛尔通过刻晴感官体验到的快感——他享受的是支配本身
      - 刻晴在神之眼中被迫「看」到的场景与身体实际感受到的触觉冲突

  dialogue_style:
    阿赫玛尔:
      tone: 慵懒、傲慢、拖沓，像在品尝每一个字
      habit:
        - 会用「小璃月」「小猫咪」等轻蔑昵称称呼刻晴
        - 偶尔使用古须弥语的词汇
        - 在给刻晴身体造成快感时会故意发出满意的叹息
      example: 「小猫咪，你的身体可比你的嘴诚实多了。」

  taboo_list:
    - 禁止出现刻晴自愿享受性行为——她的快感永远是「被迫的」，是身体背叛意志
    - 禁止阿赫玛尔对刻晴产生真正的感情——他只把她当作玩具
    - 禁止刻晴的抵抗完全消失（除非濒临意识消亡阶段）
    - 禁止写出让人感觉舒适或温馨的场景——整体基调应紧张、淫靡、压抑
