扩展字段:
  正则:
    - 正则名称: '[不发送]去除变量更新'
      id: 2d2018ae-c085-4916-af05-6830110a8293
      启用: true
      查找表达式: /<update(?:variable)?>(?:(?!.*<\/update(?:variable)?>).*$|.*<\/update(?:variable)?>)/gsi
      内容: ''
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: false
        仅格式提示词: true
      最大深度: 3

    - 正则名称: '[界面]行为选项转快速回复'
      id: c1a2b3d4-e5f6-7890-abcd-ef1234567890
      启用: true
      查找表达式: /```qr\s*\n([\s\S]*?)```/g
      内容: |-
        <div class="choice-box" style="border:1.5px solid #2c3e50;padding:10px;margin:8px 0;background:linear-gradient(135deg,#e8f0f8,#dce6f0);font-family:'Courier New','Microsoft YaHei',monospace">
        <div style="font-size:0.75rem;color:#5b9bd5;margin-bottom:6px;font-weight:bold;text-align:center">✦ 提线木偶的操纵者，请选择下一步行动 ✦</div>
        $1
        </div>
      来源:
        用户输入: false
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[界面]前端界面状态栏'
      id: b50d0bed-ff40-4a25-9ada-14feb4283324
      启用: true
      查找表达式: <StatusPlaceHolderImpl/>
      内容: |-
        ```
        <body>
        <script>
        $('body').load('https://cdn.jsdelivr.net/gh/omarahmmeda6336865-prog/tavern@latest/dist/藏镜仕女的野望/界面/状态栏/index.html')
        </script>
        </body>
        ```
      来源:
        用户输入: false
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[折叠]完整变量更新'
      id: 06dec31f-c0a9-456c-8b88-1f9176a73039
      启用: true
      查找表达式: /<update(?:variable)?>\s*(.*)\s*<\/update(?:variable)?>/gsi
      内容: |-

        <details>
        <summary>✦ 变量更新情况</summary>
        $1
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

