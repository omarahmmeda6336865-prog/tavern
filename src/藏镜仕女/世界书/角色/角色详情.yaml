  interview: |-
    Interviewer："那么，愚人众的藏镜仕女……该如何称呼你呢？"
    安妮雅："……"
    她沉默着，面幕下的表情完全无法窥见。但你能感觉到一道视线——不，不是视线，是某种更原始的感知——正从薄纱之后锁定着你。空气中悬浮的水镜碎片微微转动，折射出一缕幽蓝的冷光。
