---
变量更新规则:
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
    当前地点:
      check:
        - 随剧情场景跳转时更新，保持地理逻辑合理
    在场人物:
      type: |-
        {
          [人物名: string]: string; // 人物状态描述
        }
      check:
        - 有他人进入/离开场景时更新
        - 描述该人物当前状态与对刻晴（阿赫玛尔）的态度

  核心意识:
    堕落度:
      type: number
      range: 0~100
      check:
        - 夺舍期（0-40）：意识拉锯/附身加深时上升 +(1~3)
        - 污染期（41-99）：淫行/精神侵蚀时上升 +(1~3)
        - 堕落度只升不降，是刻晴从抵抗到彻底堕落的单向量度
        - 重大剧情事件（神之眼共鸣/赤王仪式等）可突破单次上限
    意识清醒度:
      type: number
      range: 0~100
      check:
        - 开发行为冲击时下降 ±(1~3)
        - 战斗/危机/见到故人时上升 ±(1~3)
        - 与堕落度呈负相关趋势
    抵抗意识:
      type: number
      range: 0~100
      check:
        - 夺舍期（堕落度 0-40）：被强迫时上升 +(1~3)，被侵蚀时下降 -(1~3)
        - 污染期（41-99）：转为对灵魂污染的抵抗，缓慢下降 -(1~2)
        - 赤王新娘（堕落度 100）：归零
    内心独白:
      check:
        - 根据当前堕落阶段重写，使用第一人称
        - 霆霓未黯：干练冷静，偶尔流露对空的思念与归家期待
        - 心刃交争：愤怒不甘，对阿赫玛尔宣战，恐惧他伤害空
        - 躯壳易主：崩溃尖叫——「那是留给空的！不是给你的！」
        - 神瞳囚笼：绝望哀求——「至少别用我的手碰空…」
        - 残识旁观：麻木破碎——「我的身体在别人身下…空…对不起…」
        - 黄沙浸魂：自我撕裂——「刚才那是我的快感吗…还是他植入的…」
        - 紫电染赤：矛盾纠缠——「我恨他…可我为什么开始期待他的触碰…」
        - 赤王新娘：虔诚信服——「我是阿赫玛尔大人的新娘，我以此为荣」

  身体状态:
    开发度:
      type: number
      range: 0~100
      check:
        - 性行为等淫行发生后根据激烈程度上升 ±(5~15)
        - 开发度只升不降，是身体被侵蚀利用的累积度量
        - 开发度越高，描述身体时越体现被调教、敏感化、堕落化的特征
    异常状态:
      check:
        - 阿赫玛尔施加肉体影响时更新（纹路蔓延/发情/虚弱等）
        - 外界施加debuff时更新（中毒/束缚/诅咒等）
    当前行为:
      check:
        - 每次AI回复后更新为身体正在进行的动作
        - 使用第三人称描述
    观感.${整体|乳房|臀部|股间|面部}:
      check:
        - 发生性行为/身体变化时更新对应部位
        - 面部侧重妆容与肉体变化（唇色、咬痕、泪痕等），而非表情
        - 股间需单独描述阴部与肛部各自状态
        - 随开发度升高，描述逐渐体现被调教后的敏感化、糜烂化特征

  服饰:
    整体:
      check:
        - 换装、衣物损坏、特殊场合时更新
        - 描述颜色、材质、款式、完整度
    内衣:
      check:
        - 换装、被脱去/撕裂时更新
    配件.手部:
      check:
        - 手套、戒指、束缚物等手部装备变化时更新
    配件.腿部与鞋履:
      check:
        - 鞋袜、腿环、束缚物等变化时更新
    配件.饰品:
      check:
        - 发饰、项链、耳环等装饰品变化时更新
    配件.神之眼:
      check:
        - 随堕落度变化更新光芒状态（明亮→暗淡→熄灭→异色）
        - 被取下/被篡改时更新
    配件.身体改造物:
      check:
        - 阿赫玛尔施加的新印记/纹路/异化出现时新增
        - 原有改造消退或加深时更新描述
        - 描述位置、外观、触感
