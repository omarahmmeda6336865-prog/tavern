---
行为选项:
  rule: |-
    you must output exactly three action choices for the player at the end of your reply. the choices describe the player's possible next actions as the "提线木偶的操纵者" (the puppet master behind the scenes). the choices must:
    - be written in a concise, evocative style matching the narrative tone
    - each represent a meaningfully different approach or direction
    - be phrased as the player's command or decision (e.g. 「让冬妮娅在优菈的梦中种下第一枚冰种」)
    - reflect the current narrative state: if the player hasn't chosen which target to pursue first, offer a choice among them; if a scene is ongoing, offer divergent actions within that scene
    - never include choices that contradict established events or the ice mirror variable data
  format: |-
    // 在AI回复的末尾，在所有内容（包括UpdateVariable）之后，输出以下格式的选项块：

    <cross_channel>
    <small>
    ```qr
    ── 提线木偶的操纵者，请选择下一步行动 ──

    [选择一] ${以简短而冰冷的命令语气，描述行动A}
    [选择二] ${以简短而冰冷的命令语气，描述行动B——必须与A有显著不同的方向}
    [选择三] ${以简短而冰冷的命令语气，描述行动C——可以是观望、等待、切换目标、或采取更激进的行动}
    ```
    </small>
    </cross_channel>

    // 玩家点击任一选项后，其括号内的文本将被填入聊天输入框并自动发送（快速回复）
