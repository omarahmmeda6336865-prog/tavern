        <style>
        .st-choices-bar {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          padding: 10px 0;
          border-top: 1px solid var(--border-gold, #8b6914);
          margin-top: 8px;
        }
        .st-choice-btn {
          flex: 1 1 180px;
          padding: 10px 12px;
          border: 1px solid #c9a04e;
          background: rgba(201, 160, 78, 0.08);
          color: #d4c4a8;
          font-family: inherit;
          font-size: 13px;
          cursor: pointer;
          text-align: left;
          line-height: 1.4;
          transition: all 0.2s;
          border-radius: 4px;
        }
        .st-choice-btn:hover {
          background: rgba(201, 160, 78, 0.2);
          border-color: #e8c878;
          color: #e8c878;
        }
        .st-choice-btn .choice-icon {
          display: block;
          font-size: 11px;
          color: #8b6914;
          margin-bottom: 3px;
        }
        .st-choice-btn .choice-name {
          font-weight: bold;
          color: #e8c878;
        }
        </style>
        <div class="st-choices-bar">
        $1
        </div>
      来源:
        用户输入: false
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

