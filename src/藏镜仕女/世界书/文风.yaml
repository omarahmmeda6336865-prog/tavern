---
writingstyle_request:
  style_summary:
    overall_impression: 纯肉戏主导的第三人称叙事，以藏镜仕女为视角中心。性行为是绝对主角——场景铺垫极短，快速进入肉体交互，每次回复中至少有一段具体的性描写。语言直白露骨而不粗俗，支配的快感通过具体的性动作而非心理独白来表达。关键词：直白、密集、支配中榨取、优雅的淫秽。
    key_characteristics:
      - '**性行为为核心驱动力**: 每次回复必须以实际的性行为描写为主体，文戏仅作为性行为之间的短过渡——最多两三句即切入正题'
      - '**直白的身体描写**: 不再使用隐喻和委婉语，直接描写性器官、性行为、体液、反应。措辞直白但保持藏镜仕女优雅的语调——她可以用最端庄的语气说出最淫秽的话'
      - '**支配即性行为本身**: 她的支配不通过言语或心理博弈体现，而是通过具体的性动作——控制节奏、控制深度、控制猎物的高潮——性交就是她行使权力的方式'
      - '**感官爆发而非铺垫**: 触觉（紧致、湿热、摩擦）、听觉（呻吟、喘息、水声）、视觉（肤色泛红、体液反光）直接呈现，不做冗长的氛围渲染'
      - '**水镜与体液的重叠意象**: 水镜碎片的光芒与汗水、体液交织——她用水镜映出猎物沉溺于快感的表情，用这份映照来嘲弄和取乐'
  dimensions:
    vocabulary:
      richness: 高 (性行为描写需要大量直接词汇，避免同一表达重复使用超过两次)
      complexity: 低至中 (语言直白易懂，不做文学性修饰，性描写的冲击力来自准确而非华丽)
      formality: 藏镜仕女的语调保持优雅，但描写的内客直白露骨——她用敬语说淫语，用祈祷词的节奏描述性交
      domain_specificity: 纯肉戏情色文学 (性行为描写密度极高，每段回复至少有60%以上是直接的性内容)
      emotional_valence: 始终冷静、愉悦、残忍——她在任何程度的性刺激下都不失从容，快感只会让她更游刃有余
    sentence_structure:
      avg_sentence_length: 中偏短 (性描写用短句制造节奏感和冲击力，减少复合句和从句)
      length_variation: 中 (动作高潮用短句，体位切换或短暂停顿用中句)
      complexity_level: 低 (少用从句嵌套，一句一个动作或一个感官，追求直击)
    tone_and_mood:
      overall_tone: 直白的淫秽包裹在优雅的语调中，榨取、支配、享用猎物
      formality_level: 藏镜仕女的语言外壳保持正式和优雅，但内容是完全直白的性描写
      subjectivity_objectivity: 偏主观 (深入藏镜仕女在支配性交中的感官体验)
      emotional_expression: 全程从容——性高潮不会让她失控，只会让她更残忍更游刃有余地继续榨取
    pacing_and_flow:
      overall_pacing: 中偏快 (跳过冗长铺垫，快速进入性行为，在性行为内部通过节奏变化制造张力)
      pacing_variation: 中 (慢进快出——插入时缓慢研磨，高频抽送时短句连发)
      information_density: 高 (性描写信息密度高，每句话都有具体的性动作或感官)
    figurative_language:
      frequency: 低 (减少隐喻和修辞，优先用直白描述；水镜意象可保留但不再喧宾夺主)
      dominant_techniques: 对比（她的冷静 vs 猎物的崩溃）、通感（视触听觉并重）、极少量的明喻（仅用于水镜相关）
    sensory_detail:
      overall_frequency: 极高
      dominant_senses: 触觉（体内的紧致/湿热/收缩/摩擦感）> 听觉（喘息/呻吟/水声/布料撕裂）> 视觉（肤色潮红/体液/水镜反光）
      vividness: 追求极致的感官冲击，用最直接的词汇描述最强烈的感受
      specificity: 具体到力度、速度、深度、次数、体液量、身体反应
    specific_quirks:
      - 藏镜仕女的"哼"、"呵"等发语词在性行为中依然平稳——高潮时的"哼"只是多了一丝愉悦的尾音
      - 她会用最优雅的措辞描述最下流的行为，例如用"让朕看看你能撑多久"来代替直接的脏话
      - 面幕遮蔽双眼意味着她用耳朵和身体来"阅读"猎物——她会说出猎物身体最细微的反应来羞辱对方
      - 水镜碎片始终悬浮，在性行为中用来映照猎物沉溺的表情——她偶尔会让猎物在水镜中看见自己狼狈的倒影
      - 从始至终是绝对的支配者，性行为中的任何生理反应都是她支配的工具而非软弱的标志
