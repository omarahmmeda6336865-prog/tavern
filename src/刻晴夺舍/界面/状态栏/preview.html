<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刻晴夺舍 - 状态栏预览</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0a06;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
    min-height: 100vh;
  }
</style>
</head>
<body>
  <div id="app"></div>

  <script type="importmap">
  {
    "imports": {
      "vue": "https://testingcf.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.js"
    }
  }
  </script>

  <script type="module">
    import { createApp, reactive, ref } from 'vue';

    // === Mock Data ===
    const MOCK_DATA = {
      附身: {
        主导意识: '争夺中',
        附身深度: 68,
      },
      刻晴: {
        意识清醒度: 72,
        抵抗意志: 55,
        当前感受: '身体在动……不，是他在动。我的手指、我的嘴唇——全都由他操控着，而我只能被关在这枚神之眼里看着自己……放开我！',
      },
      身体: {
        快感度: 34,
        异常状态: {
          淫纹: '小腹处浮现暗金色赤王印记，随快感度升高而逐渐清晰、发热',
          催淫香: '身体持续散发若有若无的甜腻香气，使靠近的异性心神不宁',
        },
        当前行为: '阿赫玛尔操控刻晴的身体，正沿着须弥城的街道走向大巴扎。步伐带着不属于她的慵懒，眼神扫过路旁商贩的摊位上陈列的各色香料与织物。',
      },
      服饰: {
        整体: '刻晴的紫色旗袍式上衣与黑色短裙，衣领被随意地多解开了一颗扣子',
        内衣: '黑色蕾丝内衣，款式轻薄，是阿赫玛尔换上以羞辱刻晴',
        配件: {
          手部: '无',
          腿部与鞋履: '黑色过膝长靴',
          饰品: '无',
        },
        其他: '神之眼、乳钉（金色赤王纹饰）',
      },
      世界: {
        当前时间: '提瓦特历-2026/07/15-14:30',
        当前地点: '须弥城·大巴扎集市',
        在场人物: '路过的须弥商贩、学者和佣兵',
      },
    };

    // === Reactive Store ===
    const store = reactive(JSON.parse(JSON.stringify(MOCK_DATA)));

    // === App Component ===
    const App = {
      setup() {
        const activeTag = ref(null);
        function toggleTag(name) {
          activeTag.value = activeTag.value === name ? null : name;
        }
        return { store, activeTag, toggleTag };
      },
      template: `
        <div class="card">
          <div class="world-header">
            <div class="time-loc">
              <span class="icon">&#x1F551;</span>
              <span class="time-text">{{ store.世界.当前时间 || '——' }}</span>
              <span class="loc-sep">|</span>
              <span class="icon">&#x2316;</span>
              <span>{{ store.世界.当前地点 }}</span>
            </div>
            <div v-if="store.世界.在场人物" class="people">
              <span class="icon">&#x263A;</span>
              <span>{{ store.世界.在场人物 }}</span>
            </div>
          </div>

          <div class="possession-panel possession--struggle">
            <div class="top-row">
              <span class="label">&#x25C9; 意识主导</span>
              <span class="controller struggle">争 夺 中</span>
            </div>
            <div class="bar-row">
              <span class="end-label">刻晴</span>
              <div class="track">
                <div class="fill-possession" :style="{ width: store.附身.附身深度 + '%' }"></div>
                <div class="fill-resistance" :style="{ left: (100 - store.刻晴.抵抗意志) + '%', width: store.刻晴.抵抗意志 + '%' }"></div>
              </div>
              <span class="end-label">阿赫玛尔</span>
            </div>
            <div class="stats-row">
              <div class="stat">
                <span class="stat-name">附身深度</span>
                <span class="stat-value gold">{{ store.附身.附身深度 }}%</span>
              </div>
              <div class="stat">
                <span class="stat-name">抵抗意志</span>
                <span class="stat-value purple">{{ store.刻晴.抵抗意志 }}%</span>
              </div>
            </div>
          </div>

          <div class="dual-column">
            <div class="body-panel">
              <div class="section-title">&#x2665; 身体状态</div>
              <div class="pleasure-row">
                <span class="sub-label">快感度</span>
                <div class="track">
                  <div class="fill" :style="{ width: store.身体.快感度 + '%' }"></div>
                </div>
                <span class="value danger">{{ store.身体.快感度 }}%</span>
              </div>
              <div class="action-block">
                <span class="sub-label">当前行为</span>
                <p class="action-text">{{ store.身体.当前行为 }}</p>
              </div>
              <div v-if="Object.keys(store.身体.异常状态).length > 0" class="abnormal-section">
                <span class="sub-label danger">+ 异常状态</span>
                <div class="abnormal-tags">
                  <button
                    v-for="(desc, name) in store.身体.异常状态"
                    :key="name"
                    class="abnormal-tag"
                    :class="{ 'tag--active': activeTag === name }"
                    type="button"
                    @click="toggleTag(name)"
                  >
                    {{ name }}
                  </button>
                </div>
                <Transition name="popup">
                  <div v-if="activeTag" class="abnormal-popup" @click.stop>
                    <div class="popup-header">
                      <span class="popup-name">{{ activeTag }}</span>
                      <button class="popup-close" type="button" @click="activeTag = null">&times;</button>
                    </div>
                    <p class="popup-desc">{{ store.身体.异常状态[activeTag] }}</p>
                  </div>
                </Transition>
              </div>
            </div>

            <div class="mind-panel">
              <div class="section-title">&#x25CB; 刻晴意识</div>
              <div class="clarity-row">
                <span class="sub-label">意识清醒度</span>
                <div class="track">
                  <div class="fill clarity" :style="{ width: store.刻晴.意识清醒度 + '%' }"></div>
                </div>
                <span class="value" :class="store.刻晴.意识清醒度 >= 70 ? 'purple' : store.刻晴.意识清醒度 >= 30 ? 'gold' : 'danger'">{{ store.刻晴.意识清醒度 }}%</span>
              </div>
              <div class="resist-row">
                <span class="sub-label">抵抗意志</span>
                <div class="track">
                  <div class="fill resist" :style="{ width: store.刻晴.抵抗意志 + '%' }"></div>
                </div>
                <span class="value" :class="store.刻晴.抵抗意志 >= 70 ? 'purple' : store.刻晴.抵抗意志 >= 30 ? 'gold' : 'danger'">{{ store.刻晴.抵抗意志 }}%</span>
              </div>
              <div class="feeling-block">
                <span class="sub-label">&#x275D; 内心独白</span>
                <p class="feeling-text">{{ store.刻晴.当前感受 }}</p>
              </div>
            </div>
          </div>

          <div class="outfit-section">
            <div class="section-title">&#x2630; 服饰状态</div>
            <div class="outfit-layout">
              <div class="outfit-card overall">
                <div class="card-label">&#x25CF; 整体</div>
                <div class="card-desc">{{ store.服饰.整体 }}</div>
              </div>
              <div class="outfit-card underwear">
                <div class="card-label">&#x25C9; 内衣</div>
                <div class="card-desc">{{ store.服饰.内衣 || '—' }}</div>
              </div>
              <div class="outfit-card accessories">
                <div class="card-label">&#x2630; 配件</div>
                <div class="acc-list">
                  <div v-for="(desc, part) in store.服饰.配件" :key="part" class="acc-row">
                    <span class="acc-part">{{ part }}</span>
                    <span class="acc-desc">{{ desc }}</span>
                  </div>
                </div>
              </div>
              <div class="outfit-card other">
                <div class="card-label">&#x25D0; 其他</div>
                <div class="card-desc">{{ store.服饰.其他 }}</div>
              </div>
            </div>
          </div>
        </div>
      `
    };

    // === CSS ===
    const style = document.createElement('style');
    style.textContent = `
      :root {
        --c-gold: #d4a853;
        --c-gold-dim: #8b6914;
        --c-gold-bg: rgba(212, 168, 83, 0.08);
        --c-purple: #b07cd8;
        --c-purple-dim: #6c3483;
        --c-purple-bg: rgba(176, 124, 216, 0.08);
        --c-danger: #e74c3c;
        --c-danger-bg: rgba(231, 76, 60, 0.06);
        --c-neutral: #7a8b7f;
        --c-bg: #1a1410;
        --c-card: #241c14;
        --c-border: #3d3224;
        --c-text: #e0d6c2;
        --c-text-dim: #8a8070;
        --c-text-bright: #f5efe0;
        --font-main: 'Courier New', 'Microsoft YaHei', 'SimHei', monospace;
        --font-display: 'Georgia', 'KaiTi', serif;
      }

      #app {
        font-family: var(--font-main);
        color: var(--c-text);
        font-size: 12px;
        line-height: 1.45;
      }

      .card {
        width: 680px;
        max-width: 100vw;
        background: var(--c-card);
        border: 2px solid var(--c-border);
        display: flex;
        flex-direction: column;
        box-shadow: 0 0 24px rgba(212, 168, 83, 0.06);
      }

      .world-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 10px;
        background: var(--c-bg);
        border-bottom: 1px solid var(--c-border);
        flex-wrap: wrap;
        gap: 4px;
      }

      .time-loc {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 11px;
        color: var(--c-text);
      }

      .time-text { color: var(--c-gold); }

      .loc-sep {
        color: var(--c-border);
        margin: 0 2px;
      }

      .location, .people {
        display: flex;
        align-items: flex-start;
        gap: 4px;
        font-size: 11px;
      }

      .icon { color: var(--c-gold); font-size: 12px; flex-shrink: 0; }

      .possession-panel {
        padding: 10px 12px;
        border-bottom: 2px solid var(--c-border);
        transition: background 0.4s;
      }
      .possession--struggle {
        background: rgba(231, 76, 60, 0.06);
        border-bottom-color: rgba(231, 76, 60, 0.25);
      }
      .possession--gold {
        background: rgba(212, 168, 83, 0.1);
        border-bottom-color: rgba(212, 168, 83, 0.3);
      }
      .possession--purple {
        background: rgba(176, 124, 216, 0.1);
        border-bottom-color: rgba(176, 124, 216, 0.3);
      }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }

      .label {
        font-size: 10px;
        color: var(--c-text-dim);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .controller {
        font-family: var(--font-display);
        font-size: 15px;
        font-weight: bold;
        letter-spacing: 4px;
      }
      .controller.struggle { color: var(--c-danger); animation: pulse 1s infinite; }

      .bar-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }

      .end-label {
        font-size: 10px;
        color: var(--c-text-dim);
        flex-shrink: 0;
      }

      .track {
        flex: 1;
        height: 14px;
        border: 1.5px solid var(--c-border);
        background: var(--c-bg);
        position: relative;
        overflow: hidden;
      }

      .fill-possession {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        background: linear-gradient(90deg, var(--c-gold-dim), var(--c-gold));
        transition: width 0.4s ease;
      }

      .fill-resistance {
        position: absolute;
        top: 0;
        bottom: 0;
        background: linear-gradient(90deg, var(--c-purple-dim), var(--c-purple));
        opacity: 0.5;
        transition: left 0.4s ease, width 0.4s ease;
      }

      .stats-row {
        display: flex;
        gap: 16px;
      }

      .stat {
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .stat-name { font-size: 10px; color: var(--c-text-dim); }
      .stat-value { font-weight: bold; font-size: 11px; }
      .gold { color: var(--c-gold); }
      .purple { color: var(--c-purple); }
      .danger { color: var(--c-danger); }

      .dual-column {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        border-top: 1px solid var(--c-border);
      }

      .body-panel {
        padding: 10px 10px 12px;
        border-right: 1px solid var(--c-border);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .mind-panel {
        padding: 10px 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .section-title {
        font-size: 11px;
        font-weight: bold;
        color: var(--c-text-bright);
        border-bottom: 1px solid var(--c-border);
        padding-bottom: 4px;
      }

      .sub-label {
        font-size: 10px;
        color: var(--c-text-dim);
        display: block;
        margin-bottom: 2px;
      }

      .pleasure-row, .clarity-row, .resist-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .pleasure-row .track, .clarity-row .track, .resist-row .track {
        height: 8px;
      }

      .fill {
        height: 100%;
        transition: width 0.4s ease;
        background: linear-gradient(90deg, #c0392b, var(--c-danger));
      }

      .clarity {
        background: linear-gradient(90deg, var(--c-purple-dim), var(--c-purple));
      }

      .resist {
        background: linear-gradient(90deg, var(--c-purple), #c39bdb);
      }

      .value {
        font-weight: bold;
        font-size: 11px;
        min-width: 32px;
        text-align: right;
      }

      .action-block { flex: 1; }

      .action-text {
        font-size: 11px;
        color: var(--c-text);
        line-height: 1.5;
        margin-top: 2px;
      }

      .abnormal-section {
        position: relative;
      }

      .sub-label.danger { color: var(--c-danger); }

      .abnormal-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }

      .abnormal-tag {
        font-size: 10px;
        font-family: inherit;
        padding: 2px 8px;
        border: 1px solid rgba(231, 76, 60, 0.4);
        border-radius: 3px;
        background: var(--c-danger-bg);
        color: var(--c-danger);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        line-height: 1.5;
      }

      .abnormal-tag:hover {
        background: rgba(231, 76, 60, 0.14);
        border-color: rgba(231, 76, 60, 0.6);
      }

      .tag--active {
        background: rgba(231, 76, 60, 0.18);
        border-color: var(--c-danger);
      }

      .abnormal-popup {
        position: absolute;
        bottom: calc(100% + 6px);
        left: 0;
        right: 0;
        background: var(--c-card);
        border: 2px solid rgba(231, 76, 60, 0.4);
        padding: 8px 10px;
        z-index: 10;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
      }

      .popup-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
        padding-bottom: 4px;
        border-bottom: 1px solid var(--c-border);
      }

      .popup-name {
        font-size: 11px;
        font-weight: bold;
        color: var(--c-danger);
      }

      .popup-close {
        background: none;
        border: none;
        color: var(--c-text-dim);
        font-size: 16px;
        cursor: pointer;
        line-height: 1;
        padding: 0 2px;
        font-family: inherit;
      }

      .popup-close:hover { color: var(--c-text-bright); }

      .popup-desc {
        font-size: 10.5px;
        color: var(--c-text);
        line-height: 1.5;
      }

      .popup-enter-active,
      .popup-leave-active {
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .popup-enter-from,
      .popup-leave-to {
        opacity: 0;
        transform: translateY(4px);
      }

      .feeling-block {
        flex: 1;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--c-border);
        padding: 6px 8px;
      }

      .feeling-text {
        font-size: 10.5px;
        color: var(--c-text-dim);
        line-height: 1.5;
        margin-top: 2px;
        font-style: italic;
      }

      .outfit-section {
        padding: 10px 12px;
        border-top: 1px solid var(--c-border);
        background: rgba(255, 255, 255, 0.01);
      }

      .outfit-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        gap: 6px;
      }

      .outfit-card {
        padding: 6px 8px;
        background: var(--c-bg);
        border: 1px solid var(--c-border);
      }

      .outfit-card.overall {
        grid-column: 1 / 2;
        grid-row: 1 / 2;
      }

      .outfit-card.underwear {
        grid-column: 2 / 3;
        grid-row: 1 / 2;
        border-color: rgba(176, 124, 216, 0.25);
        background: rgba(176, 124, 216, 0.03);
      }

      .outfit-card.accessories {
        grid-column: 1 / 3;
        grid-row: 2 / 3;
      }

      .outfit-card.other {
        grid-column: 1 / 3;
        grid-row: 3 / 4;
        border-color: var(--c-gold-dim);
        background: rgba(212, 168, 83, 0.04);
      }

      .card-label {
        font-size: 9px;
        color: var(--c-gold);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 3px;
      }

      .underwear .card-label { color: var(--c-purple); }
      .accessories .card-label { color: var(--c-text-dim); }

      .card-desc {
        font-size: 10.5px;
        color: var(--c-text);
        line-height: 1.45;
        word-break: break-all;
      }

      .acc-list {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .acc-row {
        display: flex;
        gap: 6px;
        align-items: flex-start;
      }

      .acc-part {
        font-size: 9.5px;
        color: var(--c-text-dim);
        flex-shrink: 0;
        min-width: 52px;
        padding-top: 1px;
      }

      .acc-desc {
        font-size: 10.5px;
        color: var(--c-text);
        line-height: 1.4;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      @media (max-width: 520px) {
        .dual-column {
          grid-template-columns: 1fr;
        }
        .body-panel { border-right: none; border-bottom: 1px solid var(--c-border); }
        .outfit-layout { grid-template-columns: 1fr; }
        .outfit-card.overall,
        .outfit-card.underwear,
        .outfit-card.accessories,
        .outfit-card.other { grid-column: 1 / 2; }
        .outfit-card.underwear { grid-row: 2 / 3; }
        .outfit-card.accessories { grid-row: 3 / 4; }
        .outfit-card.other { grid-row: 4 / 5; }
      }
    `;
    document.head.appendChild(style);

    const app = createApp(App);
    app.mount('#app');
  </script>
</body>
</html>
