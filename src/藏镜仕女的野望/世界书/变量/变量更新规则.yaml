---
变量更新规则:
  当前国度:
    国名:
      type: 蒙德 | 璃月 | 稻妻 | 须弥 | 枫丹 | 至冬 | 纳塔 | 瑶宫
      check:
        - 仅在跨章节切换国度时更新
        - 同章节内不应变更
    当前场景:
      check:
        - 每次调教事件、场景跳转时更新
        - 描述应具体到可见的地点细节

  当前时间:
    format: YYYY年MM月DD日
    check:
      - 每次事件推进、休息或旅行后更新，保持时间流逝合理
      - 若场景跳转跨度较大，应说明跳跃原因

  暴露风险:
    type: number
    range: 0~100
    check:
      - 仕女的调教行为越激进、越公开，风险递增 ±(5~15)
      - 在安全私密空间中调教不增加风险
      - 目标反抗、呼救、被发现痕迹时风险显著增加
      - 伪装态行为自然得体时可小幅降低风险

  激活对象:
    仕女团:
      type: |-
        {
          [仕女名: string]: {
            姓名: string;
            所属阵营: string;
            当前状态: '伪装态' | '仕女态' | '正常态';
            当前装扮: {
              整体: string;
              上身: string;
              下身: string;
              内衣: string;
              配件: {
                鞋履: string;
                腿部: string;
                手部: string;
              };
              其他: string;
            };
          }
        }
      check:
        - 藏镜仕女的忠诚度、身体感度、称号固定品质由世界书描述，不在此更新
        - 当前状态在伪装态与仕女态间按剧情切换
        - 装扮随场景需要和时间流逝而更换，描述应具体

    目标对象:
      type: |-
        {
          [目标名: string]: {
            姓名: string;
            所属阵营: string;
            当前状态: '伪装态' | '仕女态' | '正常态';
            忠诚度: number;  // -50~+50
            欲望值: number;  // 0~100
            身体感度: number;  // 0~100
            当前装扮: {
              整体: string;
              上身: string;
              下身: string;
              内衣: string;
              配件: {
                鞋履: string;
                腿部: string;
                手部: string;
              };
              其他: string;
            };
            称号: {
              [称号名: string]: {
                描述: string;
              };
            };
          }
        }
      check:
        - 忠诚度：目标对当前所属阵营的效忠程度，+50为完全效忠原势力，-50为完全效忠至冬；仅目标当前察觉到仕女的行为时才更新，幅度 ±(3~8)；随恶堕进程逐渐向负方向偏移
        - 欲望值：目标对性快感的心理渴求程度；每次调教行为后根据刺激强度和目标心理反应调整 ±(3~10)；初始抗拒时增幅小，后期顺服时增幅大；达到高峰后增幅减缓
        - 身体感度：目标身体对性刺激的响应程度；每次身体接触/调教后根据刺激部位和强度调整 ±(2~8)；被反复刺激的部位感度提升更快，未被触及的部位感度缓慢上升
        - 当前状态：目标从正常态进入仕女态→伪装态的转变是恶堕深化的外在标志；完全恶堕后可切换至伪装态以执行暗线任务
        - 当前装扮：随调教进程、场景切换更新；恶堕程度越深，装扮越趋向暴露/性感/受控制
        - 称号：基于目标的关键行为、心理转折或恶堕里程碑获得；最高称号为「藏镜仕女」；描述应总结获得该称号时的关键事件
