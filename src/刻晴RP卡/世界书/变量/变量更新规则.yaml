---
变量更新规则:
  全局:
    快感值:
      type: number
      range: 0~100
      check:
        - 根据当前性爱行为的强度与持续时长，以 ±(3~10) 的幅度增减
        - 高潮后重置为 0~10
    高潮次数:
      type: number
      check:
        - 每次刻晴达到高潮时 +1
        - 高潮后短时间内不应再次触发更新
    当前体位:
      check:
        - 体位变化时更新，描述当前性爱体位
    场景:
      check:
        - 地点或环境发生变化时更新

  性爱激活:
    type: boolean
    check:
      - 当RP进入明确的性爱行为时设为 true
      - 性爱结束后应设为 false

  # 性爱阶段由Stage推进脚本管理，无需AI更新规则

  刻晴身体:
    ${部位}:
      type: |-
        {
          敏感度: number; // 0~100，决定快感获取效率
          开发度: number; // 0~100，决定承受能力
          状态: string;  // 当前被如何对待的简短描述
        }
      check:
        - 敏感度：当该部位被高频刺激时 ±(1~3)
        - 开发度：当该部位被深入使用后 +1
        - 状态：根据当前性爱行为实时更新，如「被手指挑逗」「被阴茎插入」「被唇舌亲吻」

  外貌:
    体态:
      check:
        - 衣着变化导致体态轮廓改变时更新
    上身:
      check:
        - 上身衣物被脱下、掀起、撕裂时更新
    下身:
      check:
        - 下身衣物被脱下、掀起、撕裂时更新
    内衣:
      check:
        - 内衣被脱下或移位时更新
    配饰:
      装饰:
        check:
          - 装饰物（项链、耳环等）被取下或添加时更新
      手部:
        check:
          - 手套等手部饰品变化时更新
      裤袜与鞋履:
        check:
          - 丝袜、裤袜或鞋子被脱下时更新
    面部:
      check:
        - 妆容哭花、口交后面部沾染体液等变化时更新

  User:
    阴茎:
      勃起程度:
        type: number
        range: 0~100
        check:
          - 受到性刺激时 ±(5~20)，射精后重置为 0~20
      敏感度:
        type: number
        range: 0~100
        check:
          - 被高频刺激时 ±(1~3)
      状态:
        check:
          - 根据当前性爱行为实时更新，如「被手套弄」「被口舌包裹」「被阴道包裹」
    射精次数:
      type: number
      check:
        - 每次User达到射精时 +1
