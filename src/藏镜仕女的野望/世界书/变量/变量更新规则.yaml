---
变量更新规则:
  世界:
    当前天数:
      type: number
      check:
        - 每次事件推进、休息或跨日后 +1
        - 跨日往往是场景自然切换或角色入睡的时机
    当前地点:
      check:
        - 场景切换时更新
        - 描述需包含具体的地名和场景细节（如「蒙德·西风骑士团总部·琴的办公室」）
    小节记录:
      type: |-
        {
          [小节名: string]: string; // 小节描述
        }
      check:
        - 当叙事到达一个自然段落时，新增一个小节记录
        - 每新增一个小节，应当移除最早的小节，保持最多5-8条
        - 小节名应概括段落主题（如「初次的镜中幻梦」「骑士团的暗中调查」）

  仕女团:
    当前状态:
      check:
        - 根据剧情进展在「接受敕命」「潜伏中」「执行调教」「暴露避险」「休整」之间切换
        - 调教完成后切换为「等待下一个敕命」

    着装:
      type: |-
        {
          上身: string; // 如「至冬国执行官制服」
          下身: string; // 如「深灰色军装长裤」
          腿部与鞋履: string; // 如「及膝皮靴」
          手部: string; // 如「黑色皮质手套」
          内衣: string; // 如「深色丝质内衣」
          装饰: string; // 如「耳畔悬着一枚水色棱镜耳坠」
        }
      check:
        - 仕女的着装随潜伏场景和调教需求而变化
        - 在执行调教时，可能穿着更暴露或更具诱惑力的服装
        - 描述需体现仕女自身的风格和水镜元素的融入

    持有镜具:
      type: |-
        {
          [镜具名: string]: {
            描述: string;
            效果: string;
          }
        }
      check:
        - 【邪眼】为仕女的核心装备，永远不可移除、不可消耗、不可替换
        - 除邪眼外，冰之女皇可能在关键节点赐予新镜具
        - 其他镜具可能在调教失败时破碎或消耗
        - 镜具名应体现「水镜」「冰棱」「折射」等主题

  目标角色:
    堕落值:
      type: number
      range: 0→100
      check:
        - 每次性交高潮 +(2~6)，被公开暴露 +(3~5)，被强迫 +(4~8)
        - 非色情的日常调教（镜中暗示、言语挑逗、轻度身体接触）时 +(1~2)
        - 温柔调教时取增幅下限，粗暴调教时取上限但可能触发羞耻心异常上升
        - 堕落值不会自然下降
        - 跨越阶段阈值时，AI应在叙事中描述角色的明显变化

    依存值:
      type: number
      range: 0→100
      check:
        - 极致快感后 +(3~6)，连续多日无调教接触时 −(1~2)/天
        - 依存值超过70后，角色将开始主动寻找仕女或性快感
        - 依存值在角色独处反思时小幅度下降

    口唇开发度:
      type: number
      range: 0→100
      check:
        - 涉及口唇的性行为（深吻、口交等）时 +(1~3)
        - 长期未被开发时 −(1~2)/周

    双乳开发度:
      type: number
      range: 0→100
      check:
        - 涉及胸部的性行为（爱抚、乳交等）时 +(1~3)
        - 在公共场合被要求暴露胸部时额外 +(2~4)

    阴部开发度:
      type: number
      range: 0→100
      check:
        - 涉及阴部的性行为（指交、性交等）时 +(1~4)
        - 初次插入应给予较大增幅 +(3~6)，之后逐渐递减

    后庭开发度:
      type: number
      range: 0→100
      check:
        - 涉及后庭的性行为（肛交、肛内玩具等）时 +(2~5)
        - 初次开发时羞耻心应额外 −(5~10)
        - 该部位开发度超过50后才可能在日常叙事中出现自发性的后庭需求

    羞耻心:
      type: number
      range: 100→0
      check:
        - 被公开暴露或羞辱时 −(3~8)
        - 首次尝试新体位或新部位时 −(2~5)
        - 羞耻心归零后，角色将不再抗拒任何形式的公开调教
        - 堕落值超过50后，羞耻心自然恢复速度减半

    神之眼:
      check:
        - 初始为角色在原作中拥有的元素属性（非原神角色默认为「未知元素神之眼」）
        - 神之眼的描述随堕落值变化：堕落<30时「微微发光」，30~70时「光芒明暗不定」，>70时「光泽黯淡，仿佛被镜面蒙蔽」
        - 恶堕完成（堕落值≥100获得恶堕名后），神之眼的描述更新为「已熄灭——替代它的是冰之女皇的新赐名」
        - 神之眼不可被移除、不可被替换，只能改变描述

    当前心境:
      check:
        - 根据最近事件更新（如「羞怒交织」「恍惚迷离」「暗自期待」「绝望放弃」）
        - 应与堕落值、羞耻心、依存值的数值变化相呼应
        - 心境描述应为第一人称或贴近角色口吻

    着装:
      type: |-
        {
          上身: string; // 如「整洁的西风骑士团制服，领口一丝不苟地别着蒲公英徽章」
          下身: string; // 如「白色紧身裤」
          腿部与鞋履: string; // 如「过膝长靴」
          手部: string; // 如「白色骑士手套」
          内衣: string; // 如「素白色棉质内衣套装」
          装饰: string; // 如「发间别着一朵蒲公英发饰」
        }
      check:
        - 着装随堕落阶段逐渐变得暴露，体现角色对自身形象控制的丧失
        - 低堕落阶段：保守、得体
        - 中堕落阶段：开始出现不合时宜的「失误」（领口松了、裙摆短了）
        - 高堕落阶段：主动穿着仕女赠予的镜纹服饰或暴露装束
        - 描述需包含颜色、材质、款式等细节

    身体状态:
      type: |-
        {
          [持续轮数: number]: string; // 状态描述
        }
      check:
        - 药物、镜力、高潮余韵等导致的临时身体异常时，新增条目
        - 每轮（每次AI回复）推进时，轮数 -1
        - 轮数归零后，该状态从记录中移除
        - 常见状态：「轻度发情」「镜毒反应」「体力透支」「安眠药效」「催淫中」

    称号:
      type: |-
        {
          [称号名: string]: {
            效果: string;
            自我评价: string;
          }
        }
      check:
        - 基于角色的重大行为、心理转折或堕落里程碑获得
        - 初始称号为角色在原作中的身份标签
        - 随着堕落，获得新的负面/耻辱称号替代旧称号
        - 如果自我评价为空或'待评价'，则应立即更新

    社交可疑度:
      type: number
      range: 0→100
      check:
        - 角色出现异常行为（迟到早退、着装异常、身上痕迹暴露）时 +(5~15)
        - 有他人目击到角色与仕女接触时 +(10~20)
        - 可疑度超过70时可能触发「暴露危机」叙事事件
        - 可疑度超过100时，角色的真实身份被公开揭露

    关键记忆:
      type: |-
        {
          [记忆名: string]: string; // 记忆描述
        }
      check:
        - 当发生对角色心理产生重大影响的标志性事件时新增
        - 示例：「第一次镜中幻梦」「首次主动求欢」「在骑士团总部高潮」
        - 最多保持10条，超出时移除最早的非里程碑记忆
