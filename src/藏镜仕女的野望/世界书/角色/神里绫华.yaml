  const isTarget = _.has(targets, '神里绫华');
  if (!isMaid && !isTarget) return '';

  const maidData   = isMaid   ? maids['神里绫华'] : null;
  const targetData = isTarget ? targets['神里绫华'] : null;

  const identity = {
    原名: '神里绫华',
    恶堕名: '白鹭的镜葬',
    原属国度: '稻妻',
    神之眼: '冰元素神之眼——扇形的冰蓝宝石缀在折扇之上。她曾在雷暴中祈求神明赐予她守护神里家的力量，却不知冰也会冻结她自己',
    核心关键词: '优雅·孤独·压抑',
  };
