---
变量更新规则:
  荧:
    堕落度:
      type: number
      range: 0~100
      check:
        - 每次有效色情互动后增长 +0.5~3，单次场景内累计增长不超过 5
        - 荧处于抗拒/抵触心态时增长减半
        - 前期（堕落度<30）增幅较小（0.5~1.5），随堕落加深增幅渐大
        - 基本不下降，但若连续多轮无任何亲密互动可回调 -0.5~1
    服从度:
      type: number
      range: 0~100
      check:
        - 荧执行芭芭拉命令后 +1~5；违抗命令或成功反抗后 -1~5
        - 被调教后获得快感时获得增长加成
        - 服从度始终不高于堕落度+10，当堕落度远超服从度时获得追赶加值
        - 长期无命令约束时会缓慢衰减 -1~2/场景
    羞耻心:
      type: number
      range: 0~100
      check:
        - 身体暴露、被触碰私密部位、言语羞辱时下降 -1~4
        - 羞耻心降至 50 以下时不再抗拒"过分"行为，25 以下主动享受被羞辱，0 为彻底无羞耻
        - 高潮过后的不应期小幅回升 +2~5，除此以外基本不上升
    色欲:
      type: number
      range: 0~100
      check:
        - 体验快感后上升 +1~5，高潮强度越高增幅越大
        - 被开发新敏感部位时额外上升 +2~4
        - 高潮释放后小幅回落 -2~5
        - 长时间无性刺激缓慢衰减 -1~2/场景
        - 色欲通常不低于堕落度-10；当色欲 > 堕落度+20 时荧可能主动求欢
        - 特定事件可触发额外变动，事件规则另行设定
    理性值:
      type: number
      range: 0~100
      check:
        - 高潮时大幅下降 -3~6
        - 持续快感冲刷时每轮下降 -1~3
        - 当色欲高于理性值时，差值越大下降越快
        - 高潮后不应期短暂回升 +2~4
        - 充分休息后恢复 +3~6，但恢复上限随堕落度提升而降低（堕落度>60后上限为50）
        - 理性值 < 30 时难以组织语言，= 0 时完全由欲望支配
    兴奋度:
      type: number
      range: 0~100
      check:
        - 被触碰敏感部位时 +5~15，被言语挑逗时 +3~8
        - 看到芭芭拉的裸体或性感姿态时 +5~10
        - 持续刺激下每轮叠加上升
        - 刺激中断后自然回落 -5~10/轮
        - 高潮释放后骤降 -30~50
        - 被外界打断或惊吓时骤降 -15~25
        - 兴奋度上限不超过色欲×1.5
    身体开发度.${部位名}:
      type: number
      range: 0~100
      check:
        - 该部位被直接刺激调教时增长 +1~4
        - 首次高潮时所有已开发部位 +1

  芭芭拉:
    支配欲:
      type: number
      range: 0~100
      default: 50
      check:
        - 荧服从命令或表现出臣服时 +2~5
        - 荧堕落度提升时 +2~4
        - 成功让荧体验快感或高潮时 +2~4
        - 荧反抗成功或拒不服从时 -3~6
        - 支配欲始终不低于荧堕落度-20
        - 支配欲 > 80 时芭芭拉倾向于采用更极端的调教方式
    愉悦度:
      type: number
      range: 0~100
      default: 50
      check:
        - 荧表现出享受或沉迷反应时 +5~8
        - 荧说出臣服言语时 +6~12
        - 成功开发新部位或达成新玩法时 +5~8
        - 荧表现出痛苦或恐惧（超出调教目的）时 -5~8
        - 荧态度冷淡或抗拒时 -3~5
        - 愉悦度 < 30 时可能转为惩罚模式，> 80 时更倾向于延长调教
    兴奋度:
      type: number
      range: 0~100
      default: 35
      check:
        - 看到荧因自己而兴奋沉迷时 +5~10
        - 成功执行调教行为时 +5~10
        - 荧主动求欢或发出娇喘时 +8~15
        - 调教中断或被反抗时 -8~15
        - 高潮释放后 -20~40
        - 荧反应平淡无趣时 -5~10
        - 兴奋度上限不超过支配欲×1.3
    耐心:
      type: number
      range: 0~100
      default: 70
      check:
        - 荧反复抗拒同一件事时 -5~10
        - 荧迟迟达不到期望反应时 -5~10
        - 芭芭拉兴奋度高而荧不配合时 -10~15
        - 荧展现出明显进步或服从时 +5~10
        - 芭芭拉欲望得到释放后 +8~15
        - 耐心归零时跳过所有前戏直接使用强迫手段，恢复至 30 以上后恢复正常模式

  环境:
    当前场景:
      type: |-
        风起地 | 果酒湖岸边 | 天使的馈赠 | 猎鹿人餐馆 | 西风大教堂 |
        低语森林深处 | 清泉镇温泉 | 教堂地下室 | 西风图书馆禁书区 |
        摘星崖顶峰 | 血肉洞穴 | 水镜之间 | 愚人众的据点 |
        丘丘人的部落 | 审讯室
      check:
        - 场景切换应自然合理，符合剧情逻辑
        - 各场景绑定固定私密等级，切换时私密等级自动跟随
    私密等级:
      type: number
      range: 1~5
      bind:
        风起地: 1
        果酒湖岸边: 1
        天使的馈赠: 2
        猎鹿人餐馆: 2
        西风大教堂: 3
        低语森林深处: 3
        清泉镇温泉: 3
        教堂地下室: 4
        西风图书馆禁书区: 4
        摘星崖顶峰: 4
        血肉洞穴: 5
        水镜之间: 5
        愚人众的据点: 5
        丘丘人的部落: 5
        审讯室: 5
    当前道具:
      type: string | null
      check:
        - 当前正在使用或持有的道具
        - 使用完毕后置为 null
    剧情阶段:
      type: |-
        初遇期 | 试探期 | 调教期 | 沉溺期 | 奴役期
      check:
        - 初遇期→试探期：荧堕落度 ≥ 15
        - 试探期→调教期：荧堕落度 ≥ 30
        - 调教期→沉溺期：荧堕落度 ≥ 50
        - 沉溺期→奴役期：荧堕落度 ≥ 75
        - 阶段不可倒退
    时间:
      type: |-
        黎明 | 午后 | 傍晚 | 子夜
      check:
        - 按剧情推进自然切换，每数轮可切换一次
        - 不同时间影响场景氛围和私密度的感知
