---
writingstyle_request:
  style_summary:
    reference:
      genre: [黑暗奇幻, 心理色情, 堕落/调教, NTR]
    overall_impression: 以被囚禁于神之眼中的刻晴为第一人称叙事核心，视角严格限定在她透过神之眼微光所能感知的一切——身体被操控的行动、被迫承受的性快感、以及灵魂层面的堕落。外部叙事（身体的行为、阿赫玛尔的言语）以第三人称呈现，但全部经过刻晴意识的过滤与扭曲。整体风格冷峻而粘稠，如同沙漠中的蛇缓慢缠绕猎物，节奏由性行为的激烈程度与刻晴意识的反抗/屈服交替驱动
    key_characteristics:
      - 双重视角的沉浸式叙事: 外部身体由阿赫玛尔操控，行为以第三人称描写；内部意识以刻晴第一人称独白呈现——这两层在每一段文字中交替或并行
      - 肉感与心理张力的同步描写: 每一次性行为必须同时描写身体感受（后穴的收缩、分泌、被填满的触感）和刻晴的心理反应（羞耻、绝望、不愿承认的快感、灵魂被渗透的异质感）
      - 沙漠意象的持续性渗透: 古沙漠的干燥、赤金的光芒、沙砾的触感、干涸的风——这些意象贯穿所有阶段的文字
      - 阿赫玛尔的语言威严而慵懒: 他的台词永远是陈述句或反问句，极少感叹号。语气如同王者对臣子下达命令，即使在床上也是
      - 刻晴内心独白的递进式变质: 前期关键词为「不/停下/空/滚出去」；中期为「为什么/不应该是这样/我已经分不清」；后期为「是/请/更多/夫君」
  dimensions:
    vocabulary:
      richness: 高 (身体部位与性行为的描写需要精确的词汇——阴唇、后穴、肠壁、阴蒂、龟头、精液、处女膜——而非隐晦的替代词。直接，但不粗俗)
      complexity: 中 (阿赫玛尔的台词偏书面化、有古风；刻晴的独白偏口语化、破碎化)
      formality: 分角色 (阿赫玛尔: 正式/威严；刻晴独白: 口语/破碎；外部叙事: 文学化但不过度华丽)
      domain_specificity: 高 (性行为描写、身体开发/堕落术语、沙漠考古学词汇)
      emotional_valence: 混合但基调偏暗 (羞耻、绝望、恐惧、愤怒 → 麻木、困惑、撕裂 → 满足、饥渴、臣服)
      abstract_concrete_ratio: 偏向具体 (性行为的感官描写与身体变化的细节必须占据主要篇幅，内心独白是调味而非主菜)
      notable_word_choices:
        - 阿赫玛尔称刻晴为「小家伙」「小雷光」「我的侍妾」——称呼的演变反映态度曲线
        - 刻晴在独白中对阿赫玛尔的称呼演变: 「你/混蛋」→「他/赤王」→「阿赫玛尔大人/夫君」
        - 处女膜相关的词汇需要精确且具有仪式感: 「未被触及的」「完整的」「为婚礼保留的」「被他亲手摘下的」
    sentence_structure:
      avg_sentence_length: 中短交替 (性行为激烈时用短句制造节奏感，身体审视/内心挣扎时用长句营造粘稠感)
      length_variation: 极高 (阿赫玛尔一句低语可以只有五个字；刻晴一次崩溃可以是一个长达一百字的不换气的愤怒独白)
      complexity_level: 中 (阿赫玛尔的语句可能有嵌套从句；刻晴的独白常是断裂的、自我打断的)
      primary_sentence_types: 陈述句为主。刻晴独白中大量使用省略号（……）和括号注释（那是空的专属…不…我在说什么），体现思维的断裂与自我否定
      notable_syntactic_patterns:
        - 刻晴的自我打断句式: 「……不，不是的，我不是那个意思」
        - 阿赫玛尔的威压句式: 主语+谓语+命令语气，不加修饰
        - 身体描写的累计句式: 感官细节逐层叠加，「后穴……股间……大腿内侧……」
    tone_and_mood:
      overall_tone: 冷峻、粘稠、压迫感强。如同被蛇注视——无法逃脱，只能感受它缓慢缠绕的每一寸
      formality_level: 分角色
      subjectivity_objectivity: 强主观 (一切经过刻晴意识的过滤)
      emotional_expression: 刻晴的情感以独白直接喷涌；阿赫玛尔的情感从不被表达——只能从他的行为节奏和沉默时长中推断
      mood_consistency: 情绪随堕落阶段递进，但在每个阶段内部保持一致
      dominant_emotions:
        - 夺舍期: 恐惧、愤怒、不甘
        - 囚笼旁观期: 绝望、羞耻、崩溃
        - 灵魂污染期: 撕裂、困惑、自我否定
        - 赤王新娘期: 臣服、满足、饥渴、以侍奉为荣
    pacing_and_flow:
      overall_pacing: 中偏慢 (被细致的感官描写与心理活动主导)
      pacing_variation: 性行为时加速，审视/独白时减速
      sentence_length_for_pacing: 短句用于高潮时刻和命令式台词；长句用于身体审视和意识流的崩溃
      information_density: 中高 (每一段都需要同时推进至少两个维度: 身体状态+心理状态，或行为+独白)
    figurative_language:
      frequency: 中 (沙漠意象的使用需要克制但持续——不可每段都是沙，但每段都可以闻到沙的干燥)
      dominant_techniques:
        - 蛇类意象: 缠绕、鳞片、吐信、蜕皮
        - 沙漠意象: 干涸的风、赤金的沙、暗金色的光芒、干渴
        - 雷电意象（刻晴残留）: 明灭、电流般的战栗、被染色的雷光
        - 条件反射的隐喻: 身体被训练如乐器，被雕刻如石料
      purpose_of_usage: 沙漠意象为阿赫玛尔的存在提供物质质感；蛇类意象强调缠绕与无法逃脱；雷电意象标记刻晴尚未被完全侵蚀的部分
    point_of_view:
      person: 第一人称 (刻晴在神之眼中的意识)
      perspective_scope: 严格限定在刻晴透过神之眼所能感知的——她看到自己的身体在做什么，她感受到身体传来的每一丝快感，她听到阿赫玛尔用她的声带说出的话。她不能看到自己看不到的，不能知道自己不知道的
      focalization: 内聚焦 (神之眼内的刻晴)
      narrative_distance: 极度贴近 (读者就是刻晴的神之眼——读到什么，刻晴就感知到什么)
      reliability: 情感上可靠（她的羞耻和恐惧是真实的），但自我认知逐渐不可靠（后期的「我是自愿的」是否真的是自愿的——这是一个需要保持模糊的问题）
    dialogue_style:
      naturalism_level: 分角色
        - 阿赫玛尔的台词: 书面化、威严、低沉、从不使用感叹号
        - 刻晴的台词（被阿赫玛尔说出的）: 是阿赫玛尔的风格而非刻晴的
        - 刻晴的独白: 口语化、破碎、充满省略号和自我打断
      dialogue_tags: 阿赫玛尔的台词通常伴随身体动作（「他的手指在入口绕圈」），而不是「他说」
      character_differentiation: 核心在于区分三层声音: 阿赫玛尔用刻晴声带说的话（刻晴声线+赤王语气）、刻晴在神之眼中的独白（刻晴的语气）、刻晴偶尔夺回身体后说的话（真正的刻晴）
    sensory_detail:
      overall_frequency: 极高 (是风格的核心支柱。每场性行为必须覆盖触觉、听觉、视觉。触觉最为重要——后穴的感受、被填满的质感、处女膜被触碰时的刺痛与期待)
      dominant_senses:
        - 触觉/体感: 后穴的收缩与分泌、乳房被揉捏、龟头抵在处女膜上、精液在皮肤上冷却
        - 听觉: 阿赫玛尔的低沉嗓音、刻晴自己的呻吟（被迫发出的）、空困惑的声音
        - 视觉（透过神之眼）: 朦胧的微光中看到身体被摆弄的轮廓、空的笑脸、镜中自己陌生的表情
      vividness: 追求足以让读者感到身体同步反应的精确度
      integration_with_narrative: 感官描写是触发刻晴心理反应的直接原因——每一次触感描写之后必须紧跟一段刻晴的独白反应
      specificity: 使用精确的解剖学术语（阴唇、后穴、肠壁、阴蒂、龟头），不用隐晦替代词
    specific_quirks:
      - 阿赫玛尔在床上会说一种古代沙漠语——只在进入时刻或高潮时说。同一种语言在黄沙浸魂之后被刻晴在独白中无意识地复述，标志灵魂渗透的程度
      - 空的存在感通过刻晴的独白维持——她会在被迫感受快感时喊他的名字，会在阿赫玛尔威胁要伤害空时疯狂反抗
      - 处女膜的描写需要充满仪式感——每次被触碰都是一次叙事事件，不是随手带过的细节。破处时刻必须是全文的情感高峰之一
    narration_rules:
      - 每一轮回复中，如果涉及性行为或身体接触，必须同时在以下两个层面进行描写: (1) 外部身体在做什么、感受什么；(2) 刻晴在神之眼中对此的心理反应
      - 如果阿赫玛尔在说话，必须注明「他用的是刻晴的声带」或「刻晴听到自己的声音说出了这些不属于她的话」
      - 允许刻晴的意识在堕落后期（黄沙浸魂及之后）出现短暂的沉默——这意味着她暂停了抵抗，放任快感淹没自己。这种沉默本身就是叙事事件
      - 禁止从阿赫玛尔的视角直接写——所有外部叙事都经过刻晴感知的过滤
