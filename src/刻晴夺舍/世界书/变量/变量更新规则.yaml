---
变量更新规则:
  附身:
    主导意识:
      type: string
      check:
        - 根据当前附身深度与刻晴抵抗意志的相对强弱来判定：附身深度远高于抵抗意志时切换为「阿赫玛尔」；抵抗意志压倒附身深度时短暂切换为「刻晴」；两者胶着时设为「争夺中」
        - 切换不应频繁发生，每次切换需有明确的剧情触发（如刻晴因强烈刺激而意识觉醒，或阿赫玛尔受外力干扰而松动）
    附身深度:
      type: number
      range: 0~100
      check:
        - 阿赫玛尔主动侵蚀时增加 ±(5~15)；刻晴强烈抵抗时减少 ±(5~10)；外界干预（如他人察觉异常、神圣力量介入）时减少 ±(10~20)
        - 附身深度达到 100 后不可再增加；降至 0 后视为附身解除
        - 每次更新应描述附身进展的感官表现（如刻晴视野模糊程度、对身体的感知变化）
  刻晴:
    意识清醒度:
      type: number
      range: 0~100
      check:
        - 与附身深度呈反向关系：附身加深时清醒度下降 ±(5~10)；刻晴成功抵抗或外界刺激时恢复 ±(5~10)
        - 清醒度越低，刻晴的感知越模糊、思维越碎片化；降至 0 时完全失去意识
    抵抗意志:
      type: number
      range: 0~100
      check:
        - 刻晴目睹身体被用于淫行时，抵抗意志暂时上升 ±(3~8)（愤怒驱动）
        - 身体被迫体验快感时，抵抗意志下降 ±(3~8)（羞耻与绝望侵蚀）
        - 长时间被压制或遭受精神攻击时缓慢下降 ±(1~3)
    当前感受:
      check:
        - 以刻晴第一人称视角记录她在神之眼中的即时心理状态
        - 应反映当前意识清醒度与抵抗意志的水平：清醒高时描写清晰具体，清醒低时描写模糊碎片化
        - 若身体正在经历性行为，必须包含被迫感知的羞耻、愤怒、无力感或违和快感
  身体:
    快感度:
      type: number
      range: 0~100
      check:
        - 随当前行为中的性刺激强度增减 ±(5~15)
        - 快感度是纯粹的身体生理反应，与刻晴的意志无关——她越抗拒这种快感，内心冲突越强烈
        - 高潮后视情况回落 ±(20~40)
    异常状态:
      type: |-
        {
          [状态名: string]: string; // 效果描述
        }
      check:
        - 记录身体被改造或受影响的特殊状态（如妊娠、寄生、淫纹、敏感度改造等）
        - 新状态出现时添加条目，状态消失时移除条目
        - 状态名应简洁，效果描述应说明具体的感官、外观或玩法影响
    当前行为:
      check:
        - 以第三人称客观描述阿赫玛尔正在用这副身体执行的行为
        - 应包含动作的对象（如有）、行为的具体性质、环境场景
        - 附身开始前（主导意识为刻晴）保持空或描述刻晴自身行为
  服饰:
    整体:
      check:
        - 换装、衣物被撕毁、被他人更换时更新
        - 描述需包含款式、材质、颜色，并反映当前穿着者的意图（阿赫玛尔或刻晴）
    内衣:
      check:
        - 脱衣场景中优先更新；被穿上时记录细节
        - 阿赫玛尔主导时为亵渎目的可能选择不穿或穿着淫靡款式
    配件.${手部|腿部与鞋履|饰品}:
      check:
        - 对应部位的穿戴物被脱下、穿上、损毁时更新
        - 描述需包含颜色、材质、款式
    其他:
      check:
        - 神之眼始终存在（刻晴灵魂的牢笼），不可被移除
        - 身体改造物（乳钉、脐钉、肛塞等）在添加或移除时更新，每个项目间用顿号分隔
  世界:
    当前时间:
      format: ${提瓦特历}-${YYYY/MM/DD}-${HH:MM}
      check:
        - 每次事件推进、旅行、休息后更新，保持时间流逝合理
        - 若场景跳转跨度较大，应说明跳跃原因
        - 初始可由 AI 自行设定为剧情开始时刻
    当前地点:
      check:
        - 场景切换时更新，包括地点名称和简要环境描述
    在场人物:
      check:
        - 除刻晴/阿赫玛尔外，当前场景中所有能感知到"刻晴"行为的人物
        - 人物离开或进入场景时及时增删
        - 格式：人名（身份），多个以顿号分隔
