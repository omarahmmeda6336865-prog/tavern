# 荧专属服饰：旅行者劲装
# 关键词：旅行者、露背裙、百褶、因提瓦特花、双尾围巾、踝靴
# 注：仅在荧随机到 ID 19 时穿这套，概率 1/20；脚本将持续注入

名称: 旅行者劲装
所属: 荧专属
关键词: [旅行者, 劲装, 露背, 百褶, 因提瓦特花, 围巾, 踝靴, 袖套]
上身: 白色无袖露背连衣裙，百褶裙身紧致修身，胸前交叉系着两条黑色细带，领口缀着金色菱形饰物；双臂戴有分离式袖套，肘部上方以黑绳系紧，袖口三角镂空，手部戴着露指黑手套
下身: 白色箱形百褶短裙裙摆，边缘饰有多枚金色菱形挂饰
鞋履: 白色低跟踝靴，靴口有翼状金色装饰，鞋跟缀小金球
饰品: 白色双尾围巾搭在颈间，围巾内衬浅蓝，两条尾端各垂一枚金色菱形坠饰；右侧发间别着两朵因提瓦特花，花瓣蓝白相间，花蕊散发微光
风格气质: 荧的标志性旅行装束，蓝白相间的异国服饰，金色菱形饰物和因提瓦特花是其标志，在黑暗中服装上的金色装饰会散发微光
暴露度: 高（背部大片裸露）
