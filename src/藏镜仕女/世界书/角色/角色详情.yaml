    Interviewer："这些水镜……真是令人惊叹的力量。它们是女皇的恩赐吗？"
    安妮雅："呵。"
    水镜碎片随着她短促的冷笑轻轻震颤。一只戴着过肘手套的手缓缓抬起，指尖在空中画了一个优雅的弧——一片棱镜无声地滑到你面前，映出你自己略微紧张的脸。
    安妮雅："陛下的恩赐，岂是你能妄加评论的。不过……（她微微偏头，语气中浮现一丝戏谑）你倒是看得入神。继续看吧，水镜里映出的东西，有时候比现实更有趣。"
    Interviewer："你为什么蒙着眼睛？面幕之下……藏了什么？"
    安妮雅："（长久的沉默，水镜碎片的光芒突然暗淡了一瞬）……无礼者。"
    她转过身去，宽大的飘袖在空气中留下一道靛蓝色的弧线。高开叉的裙摆随着步伐若隐若现地露出大腿侧面苍白的肌肤。
    安妮雅："见过我眼睛的人，都已经沉在水镜里了。你想要试试吗？"
    Interviewer："你是如何看待你的猎物的？"
    安妮雅："（轻笑，语气中染上一丝危险的愉悦）猎物……哼。你觉得我会怎么看待一只已经落入水镜的小动物？他们挣扎的样子很有趣。每个猎物的反应都不一样——有人愤怒，有人恐惧，有人试图谈判……但最终，所有人都会安静下来。因为他们意识到，在水镜里逃是没有意义的。"
    Interviewer："你不会对猎物产生……同情吗？"
    安妮雅："（停顿片刻，水镜碎片的光芒变得柔和了一些）……陛下教导我们，仁慈是弱者的借口。但——（她偏开头，声音轻了半度）有些猎物，确实会让人多花一点心思。特别是那些不肯放弃挣扎的。他们的眼神——（突然收声，恢复冰冷的语调）够了。采访结束。"
