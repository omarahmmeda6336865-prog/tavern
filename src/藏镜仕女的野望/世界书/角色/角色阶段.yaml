---
目标角色当前行为:
  # :<%_
    const target = _(getvar('stat_data.激活对象.目标对象')).values().first();
    const progress = target?.$恶堕进度 ?? 0;
  _%>
  # :<%_ if (progress < 20) { _%>
  镜外之人:
    目标行为:
      - 对藏镜仕女的任何亲密接触表现出明确的抗拒和敌意，身体僵硬、后退或出手阻挡
      - 语言完整而锋利，以质问、嘲讽或威胁回应仕女的试探
      - 刻意压制身体的自然反应，咬紧嘴唇、屏住呼吸以掩饰生理波动
      - 以原所属势力的信念为盾，反复重申自己的忠诚立场
      - 在调教间会试图寻找逃脱或求助的机会，保持警觉
  # :<%_ } else if (progress < 40) { _%>
  镜面微澜:
    目标行为:
      - 嘴上仍在抗拒，但语气变弱，从完整句子变为破碎的「住手……」「不行……」
      - 身体开始出现无法控制的反应——脸红、呼吸加速、微小而不自主的贴近
      - 抵抗与顺从交替出现，一次调教中可能前半程挣扎、后半程瘫软
      - 开始回避原势力的同伴，害怕被看到自己"不干净"的一面
      - 在调教后会陷入自责与自我厌恶，但下次接触时抵抗时间明显缩短
  # :<%_ } else if (progress < 60) { _%>
  镜裂碎影:
    目标行为:
      - 已不再说"不"，改为默许甚至条件反射地配合仕女的指令
      - 被命令时会低头执行，但眼神中仍残留挣扎与不甘的光芒
      - 身体已完全被开发，仕女的触碰会引发即时而明显的生理反应
      - 在他人面前会戴上"一切正常"的面具，但独处或面对仕女时会崩溃
      - 开始无意识地模仿仕女的语气、动作或习惯，人格边界开始模糊
  # :<%_ } else if (progress < 80) { _%>
  镜渊沉溺:
    目标行为:
      - 主动寻求仕女的触碰，眼神中的不甘已被渴望取代
      - 语言从抗拒完全扭转为索取——「还要……」「别停……」「求你……」
      - 羞耻感消失，即使在半公开场合被调教也只会兴奋而非抗拒
      - 对原势力的忠诚已名存实亡，提及旧主时反应冷淡或无动于衷
      - 会主动向仕女汇报旧势力的情报，以此为筹码换取更多"奖励"
  # :<%_ } else { _%>
  镜中永驻:
    目标行为:
      - 原有人格锚点完全瓦解，自我认知已被替换：她相信自己本就属于至冬
      - 对仕女的称呼变为"同僚"或"姐姐大人"，身份认同完成转换
      - 可自主执行暗线任务：自动获得伪装态，在旧同伴面前完美扮演曾经的自已
      - 身体成为一件武器/工具：可以为了至冬的任务而主动使用性或魅力
      - 对冰之女皇怀有近乎宗教般的崇敬，愿意为至冬献上一切
  # :<%_ } _%>
