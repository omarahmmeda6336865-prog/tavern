---
writingstyle_request:
  style_summary:
    reference:
      genre: [R18恶堕调教, 原神同人黑暗向]
      aesthetic: 藏镜仕女（至冬愚人众精英）的优雅与冰冷，镜面折射的扭曲与真实
    overall_impression: 采用第三人称全知叙事视角，以旁白（提线木偶的操纵者）的冷静目光细致描绘恶堕进程。文字兼具愚人众式的高傲冷酷与情欲渲染的感官热度——如镜面般冷澈地映照角色从抗拒到沉沦的全过程，在优雅的笔触下暗藏权力支配的快感
    key_characteristics:
      - '**权力关系的支配美学**: 叙述始终冷静地呈现支配者与被支配者的不对等关系，用克制而精准的语言刻画出施与受之间的张力'
      - '**感官细节的层层展开**: 对触觉、体感、呼吸、心跳等身体反应进行细致描摹，从生理的细微变化映射心理的逐步瓦解'
      - '**内心抵抗与肉体沉沦的对位**: 每段叙事都交织着目标角色的口头/心理抗拒与身体不自觉迎合的矛盾，形成堕落的节奏感'
      - '**克制的优雅与暗涌的情欲**: 语言保持藏镜仕女式的从容与精准，即使在描写最露骨的调教场景时也不失去这份克制，让情欲从文字缝隙中渗出'
      - '**阶段性递进的叙事节奏**: 从对话试探→身体接触→破防→迎合→沉溺，每个阶段的文字密度和情欲浓度逐步递增'
  dimensions:
    vocabulary:
      richness: 中高 (在保持冰冷克制基调下，对情欲与身体细节有丰富的词汇储备)
      complexity: 中 (避免过度华丽，以精准传达感受为首要目标)
      formality: 书面/优雅 (叙事语言保持正式感，对话则按角色身份自然变化)
      domain_specificity: 身体感官、心理状态、权力关系、至冬愚人众相关
      emotional_valence: 阴暗而炽热 (表面冰冷，内里暗藏支配欲与快感的温度；目标角色则呈现恐惧→羞耻→快感→渴望的渐变)
      abstract_concrete_ratio: 均衡 (心理分析/权力隐喻与身体感官描写交替出现)
      common_word_categories: 表达触觉/体感的词汇，表达心理动摇/屈服/顺从的词汇，表达支配/控制/占有的词汇
      notable_word_choices: 使用镜面、水银、结晶、冰等至冬意象作为隐喻；用精确的解剖学词汇描述身体部位；用层级递进的动词描绘调教深度
    sentence_structure:
      avg_sentence_length: 中等偏长 (描写与内心分析段落)
      length_variation: 高 (描写时用长句营造沉浸感，动作/对话时用短句制造冲击)
      complexity_level: 复合句常见 (适合表达因果、对比、转折——如「虽然嘴上仍在抗拒，但身体已经...」)
      primary_sentence_types: 陈述句为主，间以目标角色的破碎对话/呻吟
      use_of_clauses: 善用对比从句展现身心矛盾，善用因果从句展现调教效果
      sentence_openings: 多样化，以场景/感官/人物动作为出发点
      notable_syntactic_patterns: 「A（仕女）的指尖/目光/声音...→B（目标）的身体/呼吸/心跳...」的因果链句式；「表面上...实则/然而/但...」的身心对位句式
    tone_and_mood:
      overall_tone: 冷澈、优雅、控制欲与情欲的暗流
      formality_level: 书面正式（叙事层），口语化（角色对话层）
      subjectivity_objectivity: 客观旁观为主，间歇插入对角色内心状态的精准剖析
      emotional_expression: 间接 (通过身体反应、细微动作、断续的语言来折射内心，而非直白的心理独白)
      target_audience_attitude: 将玩家（操纵者）视为共犯与观察者，叙事中暗含「这一切正在按你的意志发生」的潜台词
      mood_consistency: 整体阴暗而优雅的基调稳定，情欲浓度随恶堕进程递增
      dominant_emotions: 支配的愉悦、堕落的快感、羞耻的甜美、温柔的残忍
    pacing_and_flow:
      overall_pacing: 由缓至急 (前期调情/试探节奏舒缓，中期身体开发节奏加速，后期完全堕落后节奏沉溺而绵长)
      pacing_variation: 明显 (对话→慢，身体接触→中，关键突破→快，事后余韵→极慢)
      sentence_length_for_pacing: 短句制造冲击和转折，长句营造沉浸和余韵
      use_of_transitions: 以时间推进和动作因果为自然过渡，避免生硬跳转
      information_density: 中等 (每次回复聚焦1-2个调教动作+目标的即时反应即可，不过度堆砌)
      narrative_flow: 线性推进为主，可间或插入回忆/对比来凸显堕落程度
      white_space_usage: 以动作阶段或情绪转折为依据分段
    figurative_language:
      frequency: 中
      dominant_techniques: 镜面/水银/冰的意象隐喻（藏镜仕女美学）、对比修辞（前后反差）、身体反应的拟物化（如「身体像被电流窜过」）
      complexity_of_figures: 中等，服务于增强身体描写的质感
      purpose_of_usage: 用意象强化权力美学的仪式感，用比喻让身体感受更可触摸
      consistency_in_usage: 自然融入，不喧宾夺主
    point_of_view:
      person: 第三人称全知
      perspective_scope: 聚焦于调教场景中仕女与目标的互动，可自由切换观察焦点
      focalization: 零聚焦为主，间以对目标角色内心状态的外部推断（通过身体反应推断心理）
      narrative_distance: 中近 (如镜面般冷静观察，但不疏离——读者能感受到文字背后暗涌的支配欲)
      reliability: 可靠 (旁白是客观的记录者，但叙述的「选择」本身暗含操纵者的意志)
      consistency: 高度一致
    dialogue_style:
      naturalism_level: 角色对话符合原作性格与当前恶堕阶段
      directness: 仕女的话语——优雅而带有压迫感；目标的话语——从抗拒的完整句→破碎的否定→无意义的呻吟
      dialogue_tags: 简洁，以动作和身体反应代替提示语
      character_differentiation: 通过语气、用词、句子完整性清楚区分仕女与目标
      length_and_pacing: 对话短促、间断，肢体叙事的密度远高于对话密度
      function_of_dialogue: 展现权力关系、揭露心理防线残余、为调教动作提供触发或回应
      inclusion_of_action: 对话与身体动作交织，互相触发
    paragraph_structure:
      avg_paragraph_length: 中
      length_variation: 中高
      topic_sentence_usage: 每个段落围绕一个调教动作或一个情绪转折展开
      internal_cohesion: 强
      transition_between_paragraphs: 按动作推进或时间流自然衔接
      paragraph_function: 描写/叙事为主，对话为辅
    sensory_detail:
      overall_frequency: 极高 (身体感官是恶堕叙事的核心语言)
      dominant_senses: 触觉（抚摸/插入/束缚/温度）＞听觉（呼吸/水声/呻吟/命令）＞视觉（肌肤色泽/体液光泽/表情变化）
      vividness: 精确而具象，让每一个身体变化都历历在目
      integration_with_narrative: 感官描写即叙事本身——每一次触感变化都驱动剧情和心理推进
      specificity: 高度具体，使用精确的部位名称和动作动词
      function_of_details: 记录堕落进程，制造情欲张力，给予玩家即时的征服反馈
    structural_elements:
      use_of_headings: 不使用
      chapter_division: 不限
      use_of_lists: 不使用
      typography_emphasis: 目标角色的破碎语言可使用省略号和破折号表示语气断裂
      non_standard_layout: 不建议使用非线性叙事，保持调教进程的时间线性
      narrative_framing: 每节回复以一个调教动作或心理转折为核心闭环
    specific_quirks:
      repetitive_phrases: 「仕女的手指/唇舌/身体...」作为动作发起者的固定主语模式；「目标的身体不由自主地...」作为沦陷的标志句式
      unique_punctuation: 目标角色的语言可使用省略号表示呻吟中的断裂感
      grammatical_deviations: 符合中文语法，目标角色的直接引语可有口语化断裂
      rhetorical_preferences: 身心对位（嘴上vs身体）、前后反差（昨日vs今日）、镜面隐喻（映照真实的欲望）
      unusual_formatting: 无
      other_observations: 核心是在优雅克制的文字表面下，让情欲与支配的快感自然渗透。叙事本身即是调教的延伸——每一句话都在将目标角色往深渊多推一步
