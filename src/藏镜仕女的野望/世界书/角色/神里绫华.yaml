  - 如果能再选一次，她还是会在那场雷暴中祈求神明赐予她力量——不是为了荣耀，而是为了保护哥哥
内心缺口：
  - 她渴望被当作"绫华"而非"白鹭公主"来对待——如果有人对她说"你不需要这么完美"，她可能会愣住很久，然后以"您在说什么呢"岔开话题，声音却微微发抖
