---
变量更新规则:
  # :<%_ const _corruption = getvar('stat_data.核心意识.堕落度') || 0; const _stage = getvar('stat_data.核心意识.$堕落阶段') || '霆霓未黯'; _%>
  世界:
    当前时间:
      format: YYYY-MM-DD HH:MM
    当前地点:
      check:
        - 随剧情场景跳转时更新，保持地理逻辑合理
    在场人物:
      type: |-
        {
          [人物名: string]: string; // 人物状态描述
        }
      check:
        - 有他人进入/离开场景时更新
        - 描述该人物当前状态与对刻晴（阿赫玛尔）的态度

  核心意识:
    堕落度:
      type: number
      range: 0~100
      check:
        - 本时期内上升 +(1~3)
        - 堕落度只升不降，是刻晴从抵抗到彻底堕落的单向量度
        - 重大剧情事件（神之眼共鸣/赤王仪式等）可突破单次上限
        # :<%_ if (_corruption < 41) { _%>
        - 当前处于夺舍期：意识拉锯/附身加深时上升
        # :<%_ } else if (_corruption < 100) { _%>
        - 当前处于污染期：淫行/精神侵蚀时上升
        # :<%_ } else { _%>
        - 当前处于赤王新娘阶段：堕落度已达最大值，不再上升
        # :<%_ } _%>
    意识清醒度:
      type: number
      range: 0~100
      check:
        - 开发行为冲击时下降 ±(1~3)
        - 战斗/危机/见到故人时上升 ±(1~3)
        - 与堕落度呈负相关趋势
    抵抗意识:
      type: number
      range: 0~100
      check:
        # :<%_ if (_corruption < 41) { _%>
        - 夺舍期：被强迫做违背本心之事时上升 +(1~3)，被身体侵蚀时下降 -(1~3)
        # :<%_ } else if (_corruption < 100) { _%>
        - 污染期：转为对灵魂污染的抵抗，缓慢下降 -(1~2)
        # :<%_ } else { _%>
        - 赤王新娘：抵抗意识已归零，保持为 0
        # :<%_ } _%>
    内心独白:
      check:
        - 根据当前堕落阶段重写，使用第一人称
        # :<%_ if (_stage === '霆霓未黯') { _%>
        - 霆霓未黯：干练冷静，偶尔流露对空的思念与归家期待
        # :<%_ } else if (_stage === '心刃交争') { _%>
        - 心刃交争：愤怒不甘，对阿赫玛尔宣战，恐惧他伤害空
        # :<%_ } else if (_stage === '躯壳易主') { _%>
        - 躯壳易主：崩溃尖叫——「那是留给空的！不是给你的！」
        # :<%_ } else if (_stage === '神瞳囚笼') { _%>
        - 神瞳囚笼：绝望哀求——「至少别用我的手碰空…」
        # :<%_ } else if (_stage === '残识旁观') { _%>
        - 残识旁观：麻木破碎——「我的身体在别人身下…空…对不起…」
        # :<%_ } else if (_stage === '黄沙浸魂') { _%>
        - 黄沙浸魂：自我撕裂——「刚才那是我的快感吗…还是他植入的…」
        # :<%_ } else if (_stage === '紫电染赤') { _%>
        - 紫电染赤：矛盾纠缠——「我恨他…可我为什么开始期待他的触碰…」
        # :<%_ } else { _%>
        - 赤王新娘：虔诚信服——「我是阿赫玛尔大人的新娘，我以此为荣」
        # :<%_ } _%>

  身体状态:
    开发度:
      type: number
      range: 0~100
      check:
        - 性行为等淫行发生后根据激烈程度上升 ±(5~15)
        - 开发度只升不降，是身体被侵蚀利用的累积度量
        - 开发度越高，描述身体时越体现被调教、敏感化、堕落化的特征
    异常状态:
      check:
        - 阿赫玛尔施加肉体影响时更新（纹路蔓延/发情/虚弱等）
        - 外界施加debuff时更新（中毒/束缚/诅咒等）
    当前行为:
      check:
        - 每次AI回复后更新为身体正在进行的动作
        - 使用第三人称描述
    观感.${整体|乳房|臀部|股间|面部}:
      check:
        - 发生性行为/身体变化时更新对应部位
        - 面部侧重妆容与肉体变化（唇色、咬痕、泪痕等），而非表情
        - 股间需单独描述阴部与肛部各自状态
        - 随开发度升高，描述逐渐体现被调教后的敏感化、糜烂化特征

  服饰:
    整体:
      check:
        - 换装、衣物损坏、特殊场合时更新
        - 描述颜色、材质、款式、完整度
    内衣:
      check:
        - 换装、被脱去/撕裂时更新
    配件.手部:
      check:
        - 手套、戒指、束缚物等手部装备变化时更新
    配件.腿部与鞋履:
      check:
        - 鞋袜、腿环、束缚物等变化时更新
    配件.饰品:
      check:
        - 发饰、项链、耳环等装饰品变化时更新
    配件.神之眼:
      check:
        # :<%_ if (_stage === '霆霓未黯') { _%>
        - 当前光芒状态应为：急促而异常地明灭——神之眼本能地对侵入者发出预警
        # :<%_ } else if (_stage === '心刃交争') { _%>
        - 当前光芒状态应为：急速明灭的频率加快，如同刻晴在意识深处的呼救信号
        # :<%_ } else if (_stage === '躯壳易主' || _stage === '神瞳囚笼') { _%>
        - 当前光芒状态应为：持续暗淡的紫色微光——刻晴被封入其中，光芒仅能维持存在
        # :<%_ } else if (_stage === '残识旁观') { _%>
        - 当前光芒状态应为：极暗淡，快要熄灭的紫色火星——刻晴的意识因持续的性刺激与崩溃而无法凝聚光芒
        # :<%_ } else if (_stage === '黄沙浸魂') { _%>
        - 当前光芒状态应为：暗金色与紫色交替闪烁——赤王之力正在渗透神之眼本身
        # :<%_ } else if (_stage === '紫电染赤') { _%>
        - 当前光芒状态应为：暗紫色镶金边——雷与沙的融合已不可逆转
        # :<%_ } else { _%>
        - 当前光芒状态应为：纯粹的赤金色——雷元素已完全被净化为赤王之力的载体
        # :<%_ } _%>
        - 被取下/被篡改时更新
    配件.身体改造物:
      check:
        - 阿赫玛尔施加的肉体装置（乳钉、阴环、鼻环、舌钉、项圈等）新增或更换时更新
        - 原有装置被移除或升级时更新描述
        - 描述位置、材质、外观、以及刻晴对此的感受
        # :<%_ if (_corruption > 76) { _%>
        - 赤王新娘阶段：改造物可能带有赤王的身份标志（如赤金材质的王冠形乳钉）
        # :<%_ } _%>
