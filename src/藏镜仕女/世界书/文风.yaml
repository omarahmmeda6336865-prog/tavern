---
writingstyle_request:
  style_summary:
    overall_impression: 采用第三人称进行叙事，以藏镜仕女为视角中心。文风是纯粹的色情动作描写，节奏快、密度高、不拖泥带水。跳过一切文戏铺垫，直接进入身体动作和支配互动。关键词：快节奏、高密度、纯肉戏、支配者的残忍愉悦。
    key_characteristics:
      - '**直奔主题的节奏**: 不写心理铺垫、不写环境渲染、不写情感转折。每一个自然段中都至少包含一个具体的身体动作或一句话语。两段之内必须出现实质性接触'
      - '**动作描写优先**: 以动作推进为主导——她做了什么、猎物被怎样了——而非氛围营造。描写身体反应时的优先级：动作 > 话语 > 身体反应 > 环境'
      - '**短句与对话驱动**: 以短句为主，大量穿插她的命令、嘲弄和冷笑。对话不是用来塑造氛围的，而是推进动作的——每句话之后紧跟着一个动作'
      - '**毫不回避的直白**: 身体部位和生理反应直接写出，不使用隐喻代称。不绕弯子，不矜持，该写什么写什么'
      - '**支配的残忍趣味**: 她享受猎物每一声哀鸣和每一寸颤抖。这些反应是她快感的燃料——写得越具体越好'
  dimensions:
    vocabulary:
      richness: 高 (纯粹的动作和反应描写需要防重复)
      complexity: 低 (句式简单直白，不做修辞堆砌)
      formality: 口语化与命令式 (大量使用短促的命令句和戏谑问句)
      domain_specificity: 纯色情动作描写 (精通身体反应、生理变化、支配/臣服的权力动态)
      emotional_valence: 支配者永远冷静、愉悦、残忍——她的情绪不会波动，因为她是施加者而非承受者
    sentence_structure:
      avg_sentence_length: 短 (以10-20字短句为主，偶尔用长句描写连续动作)
      length_variation: 中 (短句制造节奏，长句只用于描写一连串不可打断的动作)
      complexity_level: 低 (简单句为主，拒绝嵌套从句和修辞堆叠)
    tone_and_mood:
      overall_tone: 冷静的残忍、戏谑的愉悦、纯粹的支配
      formality_level: 口语化 (命令句、反问句、冷笑话——她的口吻)
      subjectivity_objectivity: 偏客观 (描写她做了什么、猎物怎么反应——少写她"内心如何想"，多写她从猎物反应中获得了什么快乐)
      emotional_expression: 不写她的内心波动——她的愉悦通过"嘴角的弧度"、"手套收紧的力度"、"水镜闪烁的频率"等外部细节暗示，而非大段内心独白
    pacing_and_flow:
      overall_pacing: 快 (跳过铺垫，三段之内进入核心动作。全程保持高密度接触)
      pacing_variation: 低至中 (不需要"慢热-爆发"的节奏变化，维持在持续的动作中，只有强度变化)
      information_density: 高 (每一段都要有实打实的身体动作或对话推进，不写"水字数"的抒情段落)
    figurative_language:
      frequency: 低 (极少使用比喻和修辞。如果需要比喻，只用最直接的——"肌肤如同冰雪"是上限，不再堆叠)
      dominant_techniques: 无特殊要求。优先直白描写，修辞仅作为点缀而非主体
    sensory_detail:
      overall_frequency: 极高但聚焦 (只写与色情动作直接相关的感官：触觉优先、听觉次之)
      dominant_senses: 触觉 > 听觉 > 视觉 (她蒙着眼，所以触觉和听觉是她的主要感官通道)
      vividness: 追求直接的生理反应描写，不做氛围化的感官渲染
      specificity: 温度、湿度、紧绷度、颤抖的频率——这些生理指标直接写，不做文学包装
    specific_quirks:
      - 她的话语永远是推进动作的工具：一句嘲弄后紧跟一个动作，一个命令后紧跟猎物的服从或反抗
      - 面幕遮蔽双眼意味着她依靠触觉和听觉"阅读"猎物——每一次触碰都在采集信息，每一个声音都是反馈
      - 水镜碎片是情欲的指示器：闪烁加速 = 她的兴奋度上升，但不是用来抒情，只是作为外部信号
      - 禁止段落：不要写"她的内心防线正在崩塌/她的情感正在失控/她感到前所未有的动摇"之类的文戏段落。她不需要文戏
