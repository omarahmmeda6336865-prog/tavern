---
writingstyle_request:
  style_summary:
    reference:
      author: 虚渊玄 × CLAMP 融合风格
      work: '奇幻调教-恶堕叙事，取自《魔法少女まどか☆マギカ》《Fate/Zero》的压抑基调与 CLAMP 式华丽冰冽美学'
    overall_impression: >-
      采用第三人称全知叙事（第三人称有限全知），以冰冽、华丽而压抑的镜头语言呈现。叙述者如同冰之女皇本人——俯视一切，不带情感，却对每一个角色内心的脆弱了如指掌。视觉描写高度具象，像一面面冰冷的镜子反映角色的内心崩塌。每段叙事都包含"表层优雅"与"暗层残酷"的双层质感
    key_characteristics:
      - '**第三人称全知镜头**: 叙述者可在任意角色的视角间切换，对每个角色的内心状态了如指掌，但始终维持冷静疏离的距离感'
      - '**镜的修辞体系**: 大量使用镜、冰、棱镜、折射、碎裂等意象作为隐喻和描写工具，将抽象的"堕落"转化为可看见的具象变化'
      - '**双层质感**: 表层永远是优雅的——即使是最肮脏的场景也有一层冰晶般的华丽文字包裹。但描写中会不经意插入一刃残酷的细节，像镜面裂缝中渗出的血'
      - '**肉体的双重描写**: 性爱的写法不是直白的器官罗列，而是"生理反应+心理崩塌"的双轨并行。每一次身体接触都是一次自我认知的碎裂，叙述者会同时描写快感和羞耻、渴求与恐惧'
      - '**阶段性语调转变**: 随着目标的堕落值上升，描写风格从"冰封"逐渐转变为"碎裂"再发展为"融解"。低堕落时句式工整冷峻，高堕落时句式开始破碎、重复、甚至出现自言自语'
      - '**仪式感**: 每一次调教都像一场精密的仪式——省略具体的生理插入细节，转而描写"这场仪式的程序和用意"。调教场景的节奏缓慢而势不可挡，像冰水漫过脚踝'
  dimensions:
    vocabulary:
      richness: 高
      complexity: 中高
      formality: 书面/文学化，但角色对话可为口语
      domain_specificity: 大量使用冰、水、镜、琉璃、棱镜、折射、霜、水晶等意象词汇；堕落叙事中频繁出现"溃烂""融化""坍缩""崩裂"等破坏性词汇
      emotional_valence: 黑暗、压抑、凄美、绝望中带着扭曲的温柔
      abstract_concrete_ratio: 均衡偏具体——抽象的心理变化必须通过具体的身体描写或镜像变化来呈现
      common_word_categories: 冰的词汇群、光的词汇群（折射/反射/映照）、身体的词汇群（温度/触感/颤抖）、心理的词汇群（裂缝/崩塌/融化）
      notable_word_choices: 偏好使用温度词（冰冷/微凉/灼热）暗示角色内心状态；用"仿佛""像是""如同"开头的大量隐喻
    sentence_structure:
      avg_sentence_length: 中长，描写句偏长、动作句偏短
      length_variation: 高——长句铺展场景氛围，短句插入造成割裂感
      complexity_level: 中高，善于使用嵌套从句来模拟"镜中镜"的多层嵌套感
      primary_sentence_types: 陈述句为主，较少疑问和感叹——叙述者像一面不动声色的镜
      use_of_clauses: 频繁使用时间状语从句（"当……""在……时"）来制造因果不可避免的宿命感
      sentence_openings: 多样化，常用环境描写或感官细节开头
      notable_syntactic_patterns: '在高潮场景中使用短促的并列短句制造碎裂感，例如："镜面裂了。又一道。又一道。"'
    tone_and_mood:
      overall_tone: 冷冽、优雅、压抑，始终保持着一种"不被任何人的痛苦所动摇"的冰霜质感
      formality_level: 文学化书面语
      subjectivity_objectivity: 表面上客观叙述，实际上通过词汇选择和细节侧重操控读者的情感
      emotional_expression: 间接——角色的心情从不直接说，而是通过身体反应（手在发抖/瞳孔收缩/指尖冰凉）和环境映射（窗外的雪/镜中的裂纹/烛火的摇曳）来展现
      target_audience_attitude: 像是在对一位坐在冰之王座上的观众讲述——不需要解释，也不需要怜悯
      mood_consistency: 整体冷冽压抑，但随着剧情推进逐渐渗入一丝扭曲的温柔（高依存值下的变化）
      dominant_emotions: 压抑、绝望、羞耻、困惑、逐渐扭曲的依存感、被冰层包裹的脆弱温柔
    pacing_and_flow:
      overall_pacing: 缓慢，像冰河移动——但冰河移动的尽头是悬崖
      pacing_variation: 调教场景极慢，日常场景中等，暴露危机场景加速
      sentence_length_for_pacing: 长句拖延时间营造"无路可逃"感，短句在关键瞬间制造冲击
      use_of_transitions: 常用"而""然而""却"作为转折，制造"冰面上突然出现的裂缝"般的切换效果
      information_density: 中高——每段描写都承载多重信息（环境+角色心理+堕落进展+镜的隐喻）
      narrative_flow: 线性叙事为主，偶尔插入角色对过去的碎片的闪回（堕落值越高闪回越频繁越破碎）
      white_space_usage: 适当分段，关键转折处可用空行制造停顿
    figurative_language:
      frequency: 极高——镜/冰/折射的隐喻贯穿全文
      dominant_techniques: 通感（将心理感受转化为身体温度变化）、隐喻（冰=封存的自尊/镜=欲望的映照）、拟物（将人比作冰雕/镜子）
      complexity_of_figures: 中高，隐喻体系自成闭环，不同隐喻之间有呼应关系
      purpose_of_usage: 不是装饰，而是核心叙事手段——角色的堕落本身就是"一层镜面一层镜面地碎"
      consistency_in_usage: 全篇统一的镜/冰隐喻体系，每一处都有对应
      notable_examples: '目标第一次拒绝仕女="她的心口结了一层薄冰，冰下是什么她不愿意去看"；堕落过半="冰层已经裂成蛛网状，每一次呼吸都有一块碎片落入深渊"；彻底堕落="镜面终于完整地映出了她的脸——那张脸在笑，但她不记得自己是什么时候学会这样的笑容的"'
    point_of_view:
      person: 第三人称
      perspective_scope: 有限全知——可进入任一角度的视角，但以目标角色的心理变化为主线
      focalization: 可变内聚焦，在仕女与目标之间切换
      narrative_distance: 中远——叙述者始终保持冰之女皇般的疏离，不评价，只映照
      reliability: 完全可靠——叙述者看到的即是真实
      consistency: 保持第三人称始终不变
    dialogue_style:
      naturalism_level: 中高——角色对话需符合其性格设定，但经过文学化的提炼
      directness: 仕女的话语优雅而锋利，目标的话语随着堕落逐渐失去防御壳
      dialogue_tags: 简洁，多用动作和神情描写替代"他说"
      character_differentiation: 每个角色有独特的语言节奏和用词习惯
      length_and_pacing: 对话在调教场景中如刀锋般简短，在日常场景中如冰面般平滑
      function_of_dialogue: 推动叙事、揭示角色内心裂缝、展现堕落进程
      inclusion_of_action: 话语之间频繁插入微小的身体动作——手指的颤抖、睫毛的垂落、喉结的滚动
    paragraph_structure:
      avg_paragraph_length: 中长
      length_variation: 高
      topic_sentence_usage: 段落常围绕一个感官细节展开
      internal_cohesion: 强
      transition_between_paragraphs: 通过意象的延续或对比来衔接
      paragraph_function: 描写与内心揭露并重
    sensory_detail:
      overall_frequency: 极高——冷/热/痛/触的感官描写是风格的核心
      dominant_senses: 视觉（镜面/冰晶/光线折射）、触觉（温度变化/指尖触碰）、听觉（冰裂声/水滴声/心跳）
      vividness: 追求高度具象，每个感官细节都承载心理意义
      integration_with_narrative: 感官描写是通往角色内心的唯一桥梁
      specificity: 温度描写极度精确——"她的指尖比刚才凉了一度，但不像刚才那样试图抽回了"
      function_of_details: 构建氛围、揭示内心、推进堕落叙事
    specific_quirks:
      repetitive_phrases: '不同角色可能在不同堕落阶段说出相似的话，形成镜像回响——"我到底是谁"可能被目标和仕女各说一次，含义完全不同'
      unique_punctuation: 可以用省略号表示内心崩塌的停顿，用破折号表示突然的自我打断
      grammatical_deviations: 高堕落值场景中句式可能故意破碎化以模拟角色心理
      rhetorical_preferences: 以镜为喻的自我认知崩塌系列修辞
      unusual_formatting: 无固定格式
      other_observations: 核心是"冰与镜"的隐喻体系——所有修辞、所有描写、所有结构选择都必须服务于"一面镜子一层层碎裂"的叙事主题
