# 注：仅在芭芭拉随机到 ID 19 时穿这套，概率 1/20；脚本将持续注入

名称: 西风修女服
所属: 芭芭拉专属
关键词: [修女, 芭芭拉, 西风, 露肩, 蝴蝶结, 牧师帽, 连裤袜, 神之眼]
上身: 白色无袖露肩连衣裙，肩部完全裸露，领口呈优雅的圆弧形；胸前系着一个白蓝两色的大型蝴蝶结，下方垂着一条银色小十字架挂坠
下身: 白色百褶裙摆，长度至膝下小腿中段；腿部穿着带花瓣纹饰的白色连裤袜
鞋履: 白色低跟短踝靴，鞋面素净无多余装饰
饰品: 白色牧师帽，帽檐缀蓝色滚边，微斜戴在头上；腰侧别着一本金属外壳的蓝金色书籍（水属性神之眼）
风格气质: 西风教会祈礼牧师的标志性装束，纯真与圣洁的气质中，裸露的肩头和蓝白蝴蝶结又平添了几分可爱
暴露度: 中（肩部和锁骨完全裸露）
