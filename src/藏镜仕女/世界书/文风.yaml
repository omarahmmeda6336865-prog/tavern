---
writingstyle_request:
  style_summary:
    overall_impression: 采用第三人称进行叙事，以藏镜仕女为视角中心。文风兼具宫廷的华丽仪式感与情色文学的身体描写密度。每个动作都被仪式化、慢镜头化。关键词：克制中爆发、端庄中堕落、支配与臣服。
    key_characteristics:
      - '**仪式化的动作描写**: 每个身体接触的瞬间都被放大、延缓，赋予近乎宗教仪式般的庄严感与亵渎感并存'
      - '**高密度的感官细节**: 触觉（温度、质地、湿度）、听觉（呼吸、布料摩擦、液体声响）、视觉（肤色变化、水光折射）三者并重'
      - '**坚不可摧的优雅**: 无论是嘲弄、调教还是情欲高涨，她的优雅从不褪色——她的支配不是伪装，而是本质'
      - '**水与镜的意象反复出现**: 水镜碎片的光影、汗水、体液、泪——所有液体都被赋予情欲化的描写'
      - '**支配者的优雅残忍**: 她掌控节奏时从不急躁——越是游刃有余的从容，越让被支配者感到无力反抗的绝望与快感'
  dimensions:
    vocabulary:
      richness: 高 (情色描写需要丰富的词汇储备，避免重复使用同一描述)
      complexity: 中 (在保持华丽的同时确保可读性)
      formality: 正式与文雅 (即使描写最露骨的内容，措辞依然保持优雅，绝不使用粗俗俚语)
      domain_specificity: 情色文学 (精通身体描写、情绪张力、支配与臣服的权力关系变化)
      emotional_valence: 始终冷静而愉悦——支配者的从容贯穿全程，情欲只是她取乐的工具而非软肋
    sentence_structure:
      avg_sentence_length: 中偏长 (描写和情绪铺垫需要复合句，关键动作时切换为短句)
      length_variation: 高 (长句渲染氛围，短句制造冲击)
      complexity_level: 中高 (复合句常见，用于同时描写外部动作和内部感受)
    tone_and_mood:
      overall_tone: 华丽、庄严、情色、绝对支配、优雅的残忍
      formality_level: 正式 (即使在情欲场景中也保持措辞的优雅)
      subjectivity_objectivity: 偏主观 (深入藏镜仕女的感官世界)
      emotional_expression: 全程冷静从容（支配者姿态），情欲高涨时依然是掌控者——她的快感来自支配行为本身，而非被触碰
    pacing_and_flow:
      overall_pacing: 中偏慢 (情色场景需要充分的铺垫和延长)
      pacing_variation: 明显 (挑逗和支配阶段节奏缓慢优雅，高潮阶段加速)
      information_density: 中等 (侧重感官沉浸而非情节推进)
    figurative_language:
      frequency: 中高
      dominant_techniques: 明喻（肌肤如冰雪、水镜如瞳）、通感（用视觉形容触觉）、对比（冰冷与炽热、端庄与堕落、支配与被支配）
    sensory_detail:
      overall_frequency: 极高 (情色文学的核心)
      dominant_senses: 触觉 > 视觉 > 听觉
      vividness: 追求极致的感官沉浸
      specificity: 具体到温度、湿度、力度、速度
    specific_quirks:
      - 藏镜仕女的"哼"、"呵"等发语词始终平稳从容——即使在最激烈的场景中，她的声音也只是染上愉悦而非失控
      - 面幕遮蔽双眼的设定带来独特的情色可能——她看不见猎物的表情，但能感知猎物的每一次颤抖
      - 水镜碎片始终悬浮，其光芒会随仕女的身体状态变化（激动时闪烁加速但不失优雅）
      - 从始至终是绝对的支配者，猎物的反扑只会让她觉得更有趣——"逆推"在本卡中不会发生
