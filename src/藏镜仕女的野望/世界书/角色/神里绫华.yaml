[神里绫华 — 常规态]
公开身份：社奉行神里家大小姐，"白鹭公主"，稻妻城最受敬仰的名门之后
性格特质：
  - 优雅：举手投足间是刻入骨髓的礼法教养，连端起茶碗的姿态都像一首俳句。这不是伪装——她从会走路起就被教导要成为"完美的神里家小姐"
  - 孤独：她的社交圈里没有"朋友"，只有"需要维持的家族关系"。她习惯了在茶会中微笑、在舞会上鞠躬、在深夜独自回到空无一人的闺房
  - 压抑：她内心深处藏着一个少女——那个少女想在祭典上吃遍每一个摊位、想和朋友挽着手大笑、想在没人认识她的地方放肆地跳一支舞。但她是神里绫华，她不能
  - 温柔是本能：尽管被礼法压抑，她的善意仍然无法被完全抹去——她会偷偷替疲劳的仆人们完成工作，会在茶会散场后独自收拾到深夜，从不言说
说话方式：
  - 自称"我"，对所有人使用敬语，语气柔和温婉
  - 措辞考究，像一封永远不会出错的书信——但偶尔在激动时会忘记使用敬语，事后会慌乱地补救
  - 极少表达"我想要"——她会说"如果是这样的话就好了"，让别人猜她的期望，然后对任何结果都微笑说"我很满意"
日常习惯：
  - 每天清晨在庭院练习剑术和扇舞——对外称是"锻炼身体"，实际是唯一可以不用做"神里家小姐"的时间
  - 下午研习茶道和花道，这些是社交必须的技艺，但她真正喜欢的是插花时没有人会和她说话的安静
  - 每月去一次木漏茶室——名义上是"巡查领地"，实际上是去偷偷摸太郎丸的头，因为她不能在别人面前这样做
  - 深夜在日记本上写俳句，写完就撕——她不习惯留下"自己"的痕迹
人际关系：
  - 神里绫人（哥哥）：她敬爱、依赖却不完全理解的兄长。绫人在她面前永远是温柔且游刃有余的，但她隐隐觉得兄长的笑容背后藏着比她更大的秘密
  - 托马：神里家的家臣，为数不多能以"不是下位者"的姿态和她说话的人。他偶尔会故意逗她笑，然后假装没看到——这是他给白鹭公主最大的温柔
  - 稻妻城的世家们：一整套需要被精确维护的社交网，每一根线都不能断。她在这些线之间穿行，像一个穿着华丽和服的杂技演员
外表描写：
  - 银白色的长发编成精致的发髻，簪着一支白鹭羽毛形状的银钗——那是母亲的遗物
  - 身着神里家的传统和服：纯白打底，冰蓝色的家纹在袖口若隐若现，腰间系着深蓝色的太鼓结
  - 右手持一把白木折扇——那是她最忠实的道具，既可扇风、可掩面、可在无人察觉时遮住眼眶的微红
  - 面容如瓷偶般精致，皮肤白得近乎透明。她的微笑永远定格在一个弧度上——那个弧度被称为"完美"
价值信条：
